name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck
      - name: Run ShellCheck on all .sh files
        run: |
          find . -name '*.sh' -not -path './.git/*' -print0 \
            | xargs -0 shellcheck -x -S warning

  js-syntax:
    name: JS Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - name: Check JS syntax
        run: |
          find . -name '*.js' \
            -not -path './node_modules/*' \
            -not -path './.git/*' \
            -not -path './web/dist/*' \
            -print0 \
            | xargs -0 -I {} node --check {}

  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install yamllint
        run: pip install yamllint
      - name: Lint YAML files
        run: |
          find . -name '*.yml' -o -name '*.yaml' \
            | grep -v templates/ | grep -v node_modules | grep -v .git/ \
            | xargs -r yamllint -d '{extends: relaxed, rules: {line-length: disable, truthy: disable}}'

  test-bats:
    name: BATS Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install BATS
        run: sudo apt-get install -y bats
      - name: Run BATS tests
        run: bats scripts/tests/

  test-jest:
    name: Jest Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
