          const resp = await fetch('/api/restart', { method: 'POST' });
          if (!resp.ok) {
            const d = await resp.json();
            setToast({ message: d.error || 'Restart failed', type: 'error' });
            setRestarting(false);
          }
        } catch {
          setToast({ message: 'Failed to initiate restart', type: 'error' });
          setRestarting(false);
        }
      };

      const closeRestartTask = () => {
        setTaskViewer(null);
        setRestarting(false);
        // pg-monitor is restarting — wait a moment then reload the page
        setTimeout(() => window.location.reload(), 3000);
      };

      const tunnelNodes = tunnel?.nodes || [];
      const tunnelActive = tunnelNodes.some(n => n.running);
      const cfConnected = cfStatus?.available === true;

      return (
        <div>
          {/* Cloudflare Account Credentials */}
          <div className="panel">
            <div className="panel-header">
              <span>Cloudflare Account Credentials</span>
            </div>
            <div className="panel-body">
              {!cfStatus && (
                <div style={{ color: 'var(--text-muted)', fontSize: 12 }}>Checking credentials...</div>
              )}
              {cfStatus && !cfConnected && (
                <div>
                  <p style={{ fontSize: 11, color: 'var(--text-dim)', marginBottom: 10, lineHeight: 1.5 }}>
                    Required to manage Cloudflare Tunnels and Hyperdrive configs. Account ID is on your <strong>Cloudflare Dashboard</strong> sidebar or in the URL. API token needs <em>Hyperdrive</em> and <em>Cloudflare Tunnel</em> permissions.
                  </p>
                  <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', alignItems: 'flex-end' }}>
                    <div className="form-group" style={{ flex: 1, minWidth: 160, marginBottom: 0 }}>
                      <label>Account ID</label>
                      <input type="text" placeholder="From Cloudflare dashboard sidebar" value={cfAuth.account_id} onChange={e => setCfAuth(a => ({ ...a, account_id: e.target.value }))} />
                    </div>
                    <div className="form-group" style={{ flex: 1, minWidth: 200, marginBottom: 0 }}>
                      <label>API Token</label>
                      <input type="password" placeholder="Cloudflare API token" value={cfAuth.api_token} onChange={e => setCfAuth(a => ({ ...a, api_token: e.target.value }))} />
                    </div>
                    <button className="btn primary" style={{ height: 32, fontSize: 12 }} onClick={saveCfAuth} disabled={savingAuth}>
                      {savingAuth ? 'Saving...' : 'Save'}
                    </button>
                  </div>
                </div>
              )}
              {cfConnected && (
                <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                  <span style={{ fontSize: 12, color: 'var(--text-bright)', fontWeight: 500 }}>{cfStatus.account_name || ('Account ID: ' + (cfStatus.account_id || ''))}</span>
                  <Badge type="ok" text="Connected" />
                  <button className="btn" style={{ padding: '3px 10px', fontSize: 11 }} onClick={resetCfAuth}>Reset Credentials</button>
                </div>
              )}
            </div>
          </div>

          {/* Cloudflare Tunnel — collapsible, visible only when API connected */}
          {cfConnected && (
            <div className="panel">
              <div className="panel-header" style={{ cursor: 'pointer', userSelect: 'none' }} onClick={() => togglePanel('tunnel', tunnelOpen, setTunnelOpen)}>
                <span style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                  <span style={{ display: 'inline-block', transition: 'transform 0.2s', transform: tunnelOpen ? 'rotate(90deg)' : 'rotate(0deg)', fontSize: 10 }}>&#9654;</span>
                  Cloudflare Tunnel
                </span>
                <a href="https://github.com/iadityaharsh/postgresql-cluster/blob/main/docs/remote-access.md" target="_blank" rel="noopener noreferrer"
                   className="btn" style={{ padding: '3px 10px', fontSize: 11, textDecoration: 'none' }} onClick={e => e.stopPropagation()}>
                  View Docs
                </a>
              </div>
              {tunnelOpen && (
                <div className="panel-body">
                  <div style={{ marginBottom: 14, fontSize: 12, color: 'var(--text-muted)', lineHeight: 1.6 }}>
                    Expose your PostgreSQL cluster securely using Cloudflare Tunnel.
                    All cluster nodes are configured as tunnel connectors for HA.
                  </div>

                  {/* Per-node status */}
                  {tunnelNodes.length > 0 && (
                    <div style={{ marginBottom: 16 }}>
                      <table className="data-table" style={{ borderRadius: 4, overflow: 'hidden', border: '1px solid var(--border-subtle)' }}>
                        <thead>
                          <tr>
                            <th>Node</th>
                            <th>cloudflared</th>
                            <th>Service</th>
                          </tr>
                        </thead>
                        <tbody>
                          {tunnelNodes.map(n => (
                            <tr key={n.name}>
                              <td style={{ fontWeight: 500 }}>{n.name}</td>
                              <td>{n.installed ? <><Badge type="ok" text="Installed" /> <span style={{ fontSize: 11, color: 'var(--text-dim)', marginLeft: 6 }}>v{n.version}</span></> : <Badge type="err" text="Not Installed" />}</td>
                              <td>{n.running ? <Badge type="ok" text="Running" /> : n.installed ? <Badge type="warn" text="Stopped" /> : <Badge type="err" text="N/A" />}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  )}

                  {/* Create tunnel */}
                  {!tunnel?.configured && (
                    <div style={{ marginBottom: 12 }}>
                      <div style={{ display: 'flex', gap: 8, alignItems: 'flex-end' }}>
                        <div className="form-group" style={{ flex: 1, marginBottom: 0 }}>
                          <label>Tunnel Name</label>
                          <input type="text" placeholder="e.g. pg-cluster-tunnel" value={tunnelName} onChange={e => setTunnelName(e.target.value)} />
                        </div>
                        <button className="btn primary" style={{ height: 32 }} onClick={createTunnel}>Create Tunnel</button>
                      </div>
                      <p style={{ fontSize: 11, color: 'var(--text-dim)', marginTop: 6, lineHeight: 1.5 }}>
                        Creates a Cloudflare Tunnel via API and deploys the connector to all cluster nodes.
                      </p>
                    </div>
                  )}

                  {/* Tunnel public hostname routes — inline */}
                  <TunnelRoutesInline />
                </div>
              )}
            </div>
          )}

          {/* Cloudflare Hyperdrive — collapsible, visible only when API connected */}
          {cfConnected && <HyperdriveSection collapsed={!hyperdriveOpen} onToggle={() => togglePanel('hyperdrive', hyperdriveOpen, setHyperdriveOpen)} />}

          {/* Theme */}
          <div className="panel">
            <div className="panel-header"><span>Appearance</span></div>
            <div className="panel-body">
              <div style={{ marginBottom: 10, fontSize: 12, color: 'var(--text-muted)' }}>Select a theme for the dashboard. Your preference is saved in the browser.</div>
              <div className="theme-grid">
                {THEMES.map(t => (
                  <div key={t.id} className={`theme-card ${theme === t.id ? 'active' : ''}`} onClick={() => applyTheme(t.id)}>
                    <div className="theme-card-preview">
                      {t.colors.map((c, i) => <div key={i} style={{ background: c }} />)}
                    </div>
                    <div className="theme-card-label">{t.name}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* Config Backup + Restart — side by side */}
          <div style={{ display: 'flex', gap: 16, flexWrap: 'wrap' }}>
            <div style={{ flex: 1, minWidth: 240 }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--text-bright)', marginBottom: 8 }}>Configuration Backup</div>
              <div style={{ fontSize: 12, color: 'var(--text-muted)', marginBottom: 12 }}>
                Download cluster configuration. Sensitive fields are redacted.
              </div>
              <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                <button className="btn primary" onClick={exportConfig}>Export cluster.conf</button>
                <button className="btn" onClick={exportPatroniConfig}>Export Patroni Config</button>
              </div>
            </div>
            <div style={{ width: 1, background: 'var(--border-subtle)', alignSelf: 'stretch' }} />
            <div style={{ flex: 1, minWidth: 240 }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--text-bright)', marginBottom: 8 }}>Restart Cluster</div>
              <div style={{ fontSize: 12, color: 'var(--text-muted)', marginBottom: 12, lineHeight: 1.5 }}>
                Restart all services on every node. The page will reload automatically.
              </div>
              <button className="btn" style={{ border: '1px solid var(--err)', color: 'var(--err)', fontWeight: 600 }} onClick={() => setConfirmRestart(true)} disabled={restarting}>
                {restarting ? 'Restarting...' : 'Restart All Nodes'}
              </button>
            </div>
          </div>

          {confirmRestart && (
            <ConfirmModal
              title="Restart All Nodes"
              message="This will restart etcd, Patroni, vip-manager, and cloudflared on every node, then restart the dashboard. There will be brief downtime. Continue?"
              confirmText="Restart"
              confirmClass="danger"
              onConfirm={restartCluster}
              onCancel={() => setConfirmRestart(false)}
            />
          )}

          {taskViewer && <TaskViewer title={taskViewer.title} statusUrl={taskViewer.statusUrl} onClose={restarting ? closeRestartTask : closeTasks} />}
          {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
        </div>
      );
    }

    // ========== Backups Tab ==========
    function BackupsTab() {
      const [backups, setBackups] = useState({ available: false, archives: [] });
      const [storage, setStorage] = useState(null);
      const [loading, setLoading] = useState(true);
      const [backupRunning, setBackupRunning] = useState(false);
      const [toast, setToast] = useState(null);
      const [confirmRestore, setConfirmRestore] = useState(null);
      const [confirmDelete, setConfirmDelete] = useState(null);
      const [taskViewer, setTaskViewer] = useState(null);
      const [storageForm, setStorageForm] = useState({ type: 'nfs', nfs_server: '', nfs_path: '', smb_share: '', smb_user: '', smb_pass: '', smb_domain: 'WORKGROUP', schedule: '0 2 * * *', retention: '7' });
      const [nfsExports, setNfsExports] = useState([]);
      const [nfsExportsLoading, setNfsExportsLoading] = useState(false);
      const nfsScannedRef = React.useRef('');

      const scanNfsExports = useCallback(async (server) => {
        if (!server || !/^\d+\.\d+\.\d+\.\d+$/.test(server)) return;
        if (server === nfsScannedRef.current) return;
        nfsScannedRef.current = server;
        setNfsExportsLoading(true);
        try {
          const data = await fetch(`/api/storage/nfs-exports?server=${server}`).then(r => r.json());
          setNfsExports(data.exports || []);
        } catch { setNfsExports([]); }
        setNfsExportsLoading(false);
      }, []);

      const fetchBackups = useCallback(async () => {
        try {
          const [list, status] = await Promise.all([
            fetch('/api/backups').then(r => r.json()),
            fetch('/api/backups/status').then(r => r.json())
          ]);
          setBackups(list);
          setBackupRunning(status.running);
        } catch {}
        setLoading(false);
      }, []);

      const fetchStorage = useCallback(async () => {
        try {
          const data = await fetch('/api/storage').then(r => r.json());
          setStorage(data);
          if (data.nfs_server || data.nfs_path || data.smb_share) {
            setStorageForm({ type: data.type || 'nfs', nfs_server: data.nfs_server || '', nfs_path: data.nfs_path || '', smb_share: data.smb_share || '', smb_user: data.smb_user || '', smb_pass: '', smb_domain: data.smb_domain || 'WORKGROUP', schedule: data.schedule || '0 2 * * *', retention: data.retention || '7' });
          }
        } catch {
          setStorage({ enabled: false, type: 'none', nfs_server: '', nfs_path: '', smb_share: '', mounted: false });
        }
      }, []);

      useEffect(() => {
        fetchBackups();
        fetchStorage();
        const interval = setInterval(() => { fetchBackups(); fetchStorage(); }, 5000);
        return () => clearInterval(interval);
      }, [fetchBackups, fetchStorage]);

      const createBackup = async () => {
        try {
          const resp = await fetch('/api/backups', { method: 'POST' });
          const data = await resp.json();
          if (resp.ok) {
            setBackupRunning(true);
            setTaskViewer({ title: 'Backup — pg_dumpall + Borg', statusUrl: '/api/backups/status' });
          } else {
            setToast({ message: data.error, type: 'error' });
          }
        } catch { setToast({ message: 'Failed to start backup', type: 'error' }); }
      };

      const restoreBackup = async (archive) => {
        setConfirmRestore(null);
        try {
          const resp = await fetch('/api/backups/restore', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ archive })
          });
          const data = await resp.json();
          if (resp.ok) {
            setTaskViewer({ title: `Restore — ${archive}`, statusUrl: '/api/backups/restore/status' });
          } else {
            setToast({ message: data.error, type: 'error' });
          }
        } catch { setToast({ message: 'Failed to start restore', type: 'error' }); }
      };

      const deleteArchive = async (name) => {
        setConfirmDelete(null);
        try {
          const resp = await fetch(`/api/backups/${encodeURIComponent(name)}`, { method: 'DELETE' });
          const data = await resp.json();
          if (resp.ok) { setToast({ message: data.message, type: 'success' }); fetchBackups(); }
          else { setToast({ message: data.error, type: 'error' }); }
        } catch { setToast({ message: 'Failed to delete archive', type: 'error' }); }
      };

      const configureStorage = async () => {
        try {
          const resp = await fetch('/api/storage', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(storageForm)
          });
          const data = await resp.json();
          if (resp.ok) {
            if (storageForm.type !== 'none') {
              setTaskViewer({ title: 'Borg Setup — ' + (storageForm.type === 'nfs' ? 'NFS' : 'SMB'), statusUrl: '/api/storage/status' });
            } else {
              setToast({ message: 'Backups disabled', type: 'success' });
              fetchStorage();
            }
          } else {
            setToast({ message: data.error, type: 'error' });
          }
        } catch { setToast({ message: 'Failed to configure storage', type: 'error' }); }
      };

      const closeTaskViewer = () => {
        setTaskViewer(null);
        fetchBackups();
        fetchStorage();
      };

      const storageConfigured = storage && storage.enabled && storage.type !== 'none';
      const [showResetConfirm, setShowResetConfirm] = useState(false);

      const resetStorage = async () => {
        setShowResetConfirm(false);
        try {
          const resp = await fetch('/api/storage', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ type: 'none' })
          });
          if (resp.ok) {
            setStorageForm({ type: 'nfs', nfs_server: '', nfs_path: '', smb_share: '', smb_user: '', smb_pass: '', smb_domain: 'WORKGROUP', schedule: '0 2 * * *', retention: '7' });
            setToast({ message: 'Backup location reset', type: 'success' });
            fetchStorage();
          }
        } catch { setToast({ message: 'Failed to reset', type: 'error' }); }
      };

      return (
        <div>
          {/* Borg Configuration — Nextcloud AIO style state machine */}
          <div className="panel">
            <div className="panel-header">
              <span>Borg Configuration</span>
              {storageConfigured && (
                <button className="btn danger" style={{ fontSize: 11, padding: '3px 10px' }} onClick={() => setShowResetConfirm(true)}>Reset Backup Location</button>
              )}
            </div>
            <div className="panel-body">
              {!storage ? <div className="empty">Loading...</div> :
               !storageConfigured ? (
                /* ---- State: Not Configured — show inline setup form ---- */
                <div style={{ maxWidth: 480 }}>
                  <p style={{ marginBottom: 14, color: 'var(--text-muted)', fontSize: 13 }}>Configure where Borg backups are stored. Settings apply to all cluster nodes.</p>
                  <div className="form-group">
                    <label>Storage Type</label>
                    <select value={storageForm.type} onChange={e => setStorageForm({ ...storageForm, type: e.target.value })}>
                      <option value="nfs">NFS Share</option>
                      <option value="smb">SMB/CIFS Share</option>
                    </select>
                  </div>
                  {storageForm.type === 'nfs' && (
                    <div className="form-row">
                      <div className="form-group">
                        <label>Server</label>
                        <input type="text" placeholder="e.g. 10.0.0.50" value={storageForm.nfs_server}
                          onChange={e => {
                            setStorageForm({ ...storageForm, nfs_server: e.target.value, nfs_path: '' });
                            setNfsExports([]);
                            nfsScannedRef.current = '';
                          }}
                          onBlur={e => scanNfsExports(e.target.value)} />
                      </div>
                      <div className="form-group">
                        <label>Export Path</label>
                        {nfsExports.length > 0 ? (
                          <select value={storageForm.nfs_path} onChange={e => setStorageForm({ ...storageForm, nfs_path: e.target.value })}>
                            <option value="">Select export...</option>
                            {nfsExports.map(exp => (
                              <option key={exp.path} value={exp.path}>{exp.path}</option>
                            ))}
                          </select>
                        ) : (
                          <input type="text" value={storageForm.nfs_path}
                            placeholder={nfsExportsLoading ? 'Scanning...' : '/export/path'}
                            onChange={e => setStorageForm({ ...storageForm, nfs_path: e.target.value })} />
                        )}
                      </div>
                    </div>
                  )}
                  {storageForm.type === 'smb' && (
                    <>
                      <div className="form-group">
                        <label>SMB Share</label>
                        <input type="text" placeholder="e.g. //10.0.0.50/backups" value={storageForm.smb_share} onChange={e => setStorageForm({ ...storageForm, smb_share: e.target.value })} />
                      </div>
                      <div className="form-row">
                        <div className="form-group">
                          <label>Username</label>
                          <input type="text" placeholder="e.g. backupuser" value={storageForm.smb_user} onChange={e => setStorageForm({ ...storageForm, smb_user: e.target.value })} />
                        </div>
                        <div className="form-group">
                          <label>Password</label>
                          <input type="password" placeholder="••••••••" value={storageForm.smb_pass} onChange={e => setStorageForm({ ...storageForm, smb_pass: e.target.value })} />
                        </div>
                      </div>
                      <div className="form-group">
                        <label>Domain</label>
                        <input type="text" placeholder="WORKGROUP" value={storageForm.smb_domain} onChange={e => setStorageForm({ ...storageForm, smb_domain: e.target.value })} />
                      </div>
                    </>
                  )}
                  <div className="form-row">
                    <div className="form-group">
                      <label>Backup Schedule (cron)</label>
                      <input type="text" placeholder="0 2 * * *" value={storageForm.schedule} onChange={e => setStorageForm({ ...storageForm, schedule: e.target.value })} />
                    </div>
                    <div className="form-group">
                      <label>Retention (days)</label>
                      <input type="number" min="1" value={storageForm.retention} onChange={e => setStorageForm({ ...storageForm, retention: e.target.value })} />
                    </div>
                  </div>
                  <button className="btn primary" onClick={configureStorage} style={{ marginTop: 8 }}>Submit Backup Location</button>
                </div>
              ) : (
                /* ---- State: Configured — show status summary ---- */
                <table className="kv-table">
                  <tbody>
                    <tr>
                      <td>Status</td>
                      <td>
                        <div className="storage-status">
                          <span className={`storage-dot ${storage.mounted ? 'mounted' : 'unmounted'}`}></span>
                          {storage.mounted ? 'Mounted' : 'Not Mounted'}
                          {!storage.mounted && storage.type === 'smb' && (
                            <button className="btn" onClick={async () => {
                              try {
                                const r = await fetch('/api/storage/mount', { method: 'POST' });
                                const d = await r.json();
                                if (r.ok) { setToast({ message: d.message || 'Mount successful', type: 'success' }); fetchStorage(); }
                                else { setToast({ message: d.error || 'Mount failed', type: 'error' }); }
                              } catch { setToast({ message: 'Mount request failed', type: 'error' }); }
                            }} style={{ marginLeft: 8, padding: '2px 8px', fontSize: 10 }}>
                              Mount
                            </button>
                          )}
                        </div>
                      </td>
                    </tr>
                    <tr><td>Type</td><td>{storage.type === 'nfs' ? 'NFS Share' : 'SMB/CIFS Share'}</td></tr>
                    {storage.type === 'smb' ? (
                      <>
                        <tr><td>Share</td><td>{storage.smb_share}</td></tr>
                        <tr><td>User</td><td>{storage.smb_user || '—'}</td></tr>
                      </>
                    ) : (
                      <tr><td>Location</td><td>{storage.nfs_server}:{storage.nfs_path}</td></tr>
                    )}
                    <tr><td>Repository</td><td>/mnt/pg-backup/borg-repo</td></tr>
                    <tr><td>Schedule</td><td>{storage.schedule}</td></tr>
                    <tr><td>Retention</td><td>{storage.retention} days</td></tr>
                  </tbody>
                </table>
              )}
            </div>
          </div>

          {/* Backup Archives — only shown when configured */}
          {storageConfigured && (
            <div className="panel">
              <div className="panel-header">
                <span>Backup Archives</span>
                <button className="btn primary" onClick={createBackup} disabled={backupRunning || !storage.mounted}>
                  {backupRunning ? 'Running...' : 'Create Backup'}
                </button>
              </div>
              <div className="panel-body" style={{ padding: 0 }}>
                {loading ? <div className="empty">Loading...</div> :
                 !storage.mounted ? <div className="empty">Waiting for storage to be mounted...</div> :
                 !backups.available ? <div className="empty">{backups.error || 'Initializing Borg repository...'}</div> :
                 backups.archives.length === 0 ? <div className="empty">No backups yet. Click "Create Backup" to create the first one.</div> : (
                  <table>
                    <thead><tr><th>Archive Name</th><th>Created</th><th>Actions</th></tr></thead>
                    <tbody>
                      {backups.archives.map((a, i) => (
                        <tr key={i}>
                          <td><span className="backup-name">{a.name}</span></td>
                          <td style={{ fontSize: 12, color: 'var(--text-muted)' }}>{formatDate(a.start)}</td>
                          <td style={{ display: 'flex', gap: 4 }}>
                            <button className="btn danger" onClick={() => setConfirmRestore(a.name)}>Restore</button>
                            <button className="btn" onClick={() => setConfirmDelete(a.name)} style={{ fontSize: 11 }}>Delete</button>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                )}
              </div>
            </div>
          )}

          {confirmDelete && (
            <ConfirmModal
              title="Delete Archive"
              message={`Permanently delete "${confirmDelete}" from the Borg repository? This cannot be undone.`}
              confirmText="Delete"
              confirmClass="danger"
              onConfirm={() => deleteArchive(confirmDelete)}
              onCancel={() => setConfirmDelete(null)}
            />
          )}

          {showResetConfirm && (
            <ConfirmModal
              title="Reset Backup Location"
              message="This will disable backups and clear the storage configuration on all nodes. Existing backup archives on the remote storage will NOT be deleted. Are you sure?"
              confirmText="Reset"
              confirmClass="danger"
              onConfirm={resetStorage}
              onCancel={() => setShowResetConfirm(false)}
            />
          )}

          {confirmRestore && (
            <ConfirmModal
              title="Restore Backup"
              message={`This will restore "${confirmRestore}" to the database via the VIP. Existing data in affected databases will be overwritten. Are you sure?`}
              confirmText="Restore"
              confirmClass="danger"
              onConfirm={() => restoreBackup(confirmRestore)}
              onCancel={() => setConfirmRestore(null)}
            />
          )}

          {taskViewer && (
            <TaskViewer
              title={taskViewer.title}
              statusUrl={taskViewer.statusUrl}
              onClose={closeTaskViewer}
            />
          )}

          {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
        </div>
      );
    }

    // ========== Node Detail View ==========
    function NodeDetailTab({ node, systemData }) {
      const p = node?.patroni || {};
      const isLeader = p.role === 'master' || p.role === 'primary';
      const isRunning = p.state === 'running';
      const sys = systemData?.find(s => s.name === node?.name || s.hostname === node?.name);

      return (
        <div>
          <div className="panel-grid cols-2">
            <div className="panel">
              <div className="panel-header">Patroni Status</div>
              <div className="panel-body" style={{ padding: 0 }}>
                <table className="kv-table">
                  <tbody>
                    <tr><td>Role</td><td><Badge type={isLeader ? 'ok' : 'info'} text={isLeader ? 'Leader' : 'Replica'} /></td></tr>
                    <tr><td>State</td><td><Badge type={isRunning ? 'ok' : 'err'} text={p.state || 'unknown'} /></td></tr>
                    <tr><td>PostgreSQL</td><td>{p.server_version || '-'}</td></tr>
                    <tr><td>Timeline</td><td>{p.timeline || '-'}</td></tr>
                    <tr><td>Patroni Version</td><td>{p.patroni?.version || '-'}</td></tr>
                    <tr><td>Scope</td><td>{p.patroni?.scope || '-'}</td></tr>
                  </tbody>
                </table>
              </div>
            </div>

            <div className="panel">
              <div className="panel-header">System</div>
              <div className="panel-body">
                {!sys || sys.error ? <div className="empty">System data unavailable</div> : (
                  <div style={{ display: 'flex', justifyContent: 'space-around' }}>
                    <Gauge percent={sys.memory?.used_percent || 0} label="Memory" detail={`${formatBytes(sys.memory?.total_bytes - sys.memory?.free_bytes)} / ${formatBytes(sys.memory?.total_bytes)}`} />
                    <div className="gauge-container">
                      <div style={{ textAlign: 'center', padding: '20px 0' }}>
                        <div style={{ fontSize: 28, fontWeight: 700, color: 'var(--text-bright)' }}>{sys.cpu_count}</div>
                        <div style={{ fontSize: 11, color: 'var(--text-dim)', marginTop: 2 }}>Load: {sys.load_avg?.['1m']?.toFixed(2) ?? 'N/A'} / {sys.load_avg?.['5m']?.toFixed(2) ?? 'N/A'} / {sys.load_avg?.['15m']?.toFixed(2) ?? 'N/A'}</div>
                      </div>
                      <div className="gauge-label">CPU Cores</div>
                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ========== Main App ==========
    function App() {
      const [cluster, setCluster] = useState(null);
      const [databases, setDatabases] = useState([]);
      const [connections, setConnections] = useState(null);
      const [replication, setReplication] = useState([]);
      const [system, setSystem] = useState([]);
      const [lastUpdate, setLastUpdate] = useState(null);
      const [error, setError] = useState(false);
      const [view, setView] = useState({ type: 'cluster', tab: 'summary' });
      const [sidebarFilter, setSidebarFilter] = useState('');
      const [expanded, setExpanded] = useState({ cluster: true });
      const [sidebarWidth, setSidebarWidth] = useState(() => {
        try { return parseInt(localStorage.getItem('sidebarWidth')) || 240; } catch { return 240; }
      });
      const sidebarRef = React.useRef(null);
      const draggingRef = React.useRef(false);

      useEffect(() => {
        const onMouseMove = (e) => {
          if (!draggingRef.current) return;
          const newWidth = Math.min(500, Math.max(180, e.clientX));
          setSidebarWidth(newWidth);
        };
        const onMouseUp = () => {
          if (draggingRef.current) {
            draggingRef.current = false;
            document.body.style.cursor = '';
            document.body.style.userSelect = '';
            try { localStorage.setItem('sidebarWidth', sidebarWidth); } catch {}
          }
        };
        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
        return () => { document.removeEventListener('mousemove', onMouseMove); document.removeEventListener('mouseup', onMouseUp); };
      }, [sidebarWidth]);

      const fetchData = useCallback(async () => {
        try {
          const [c, d, conn, r, s] = await Promise.all([
            fetch('/api/cluster').then(r => r.json()),
            fetch('/api/databases').then(r => r.json()),
            fetch('/api/connections').then(r => r.json()),
            fetch('/api/replication').then(r => r.json()),
            fetch('/api/system').then(r => r.json())
          ]);
          setCluster(c); setDatabases(d); setConnections(conn); setReplication(r); setSystem(s);
          setLastUpdate(new Date());
          setError(false);
        } catch { setError(true); }
      }, []);

      useEffect(() => {
        fetchData();
        const interval = setInterval(fetchData, 2000);
        return () => clearInterval(interval);
      }, [fetchData]);

      const nodes = cluster?.nodes || [];
      const nodesUp = nodes.filter(n => n.patroni?.state === 'running').length;
      const leader = nodes.find(n => n.patroni?.role === 'master' || n.patroni?.role === 'primary');
      const healthy = nodesUp === nodes.length && leader;

      const clusterTabs = ['summary', 'nodes', 'settings', 'backups'];
      const nodeTabs = ['summary'];

      const currentTabs = view.type === 'cluster' ? clusterTabs : nodeTabs;
      const selectedNode = view.type === 'node' ? nodes.find(n => n.name === view.name) : null;

      const breadcrumb = view.type === 'cluster'
        ? [{ label: cluster?.cluster_name || 'Cluster' }]
        : [{ label: cluster?.cluster_name || 'Cluster', onClick: () => setView({ type: 'cluster', tab: 'summary' }) }, { label: view.name }];

      return (
        <div className="layout">
          {/* Topbar */}
          <div className="topbar">
            <div className="topbar-left">
              <div className="topbar-logo">P</div>
              <div className="topbar-title">PostgreSQL Cluster Manager</div>
            </div>
            <div className="topbar-right">
              <VersionBadge />
              <div className="topbar-status">
                <div className={`status-indicator ${healthy ? 'ok' : error ? 'err' : 'warn'}`} />
                <span>{healthy ? 'Healthy' : error ? 'Error' : 'Degraded'}</span>
              </div>
              <span>{lastUpdate ? lastUpdate.toLocaleTimeString() : '-'}</span>
              <a href="https://github.com/iadityaharsh/postgresql-cluster" target="_blank" rel="noopener noreferrer"
                 style={{ color: 'var(--text)', display: 'flex', alignItems: 'center', gap: 8, padding: '4px 10px', background: 'var(--bg-btn)', border: '1px solid var(--border)', borderRadius: 4, textDecoration: 'none', fontSize: 12, transition: 'all 0.15s' }}
                 onMouseEnter={e => { e.currentTarget.style.background = 'var(--bg-btn-hover)'; }}
                 onMouseLeave={e => { e.currentTarget.style.background = 'var(--bg-btn)'; }}>
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" style={{ flexShrink: 0 }}>
                  <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
                </svg>
                <span style={{ fontWeight: 500 }}>postgresql-cluster</span>
                <GithubStars />
              </a>
            </div>
          </div>

          <div className="body-row">
          {/* Sidebar — Proxmox-style tree */}
          <div className="sidebar" ref={sidebarRef} style={{ display: 'flex', flexDirection: 'column', width: sidebarWidth }}>
            <div className="sidebar-resize" onMouseDown={(e) => { e.preventDefault(); draggingRef.current = true; document.body.style.cursor = 'col-resize'; document.body.style.userSelect = 'none'; }} />
            <div className="tree-search">
              <input type="text" placeholder="Search" value={sidebarFilter} onChange={e => setSidebarFilter(e.target.value)} />
            </div>

            <div style={{ flex: 1, overflowY: 'auto', paddingBottom: 50 }}>
              {/* Cluster (Datacenter equivalent) */}
              <div className="tree-node">
                <div className={`tree-row ${view.type === 'cluster' && view.tab !== 'backups' ? 'active' : ''}`}
                     onClick={() => { setView({ type: 'cluster', tab: 'summary' }); setExpanded(e => ({ ...e, cluster: !e.cluster })); }}>
                  <div className={`tree-arrow ${expanded.cluster ? 'open' : ''}`}>&#9654;</div>
                  <div className="tree-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" strokeWidth="2"><rect x="2" y="3" width="20" height="6" rx="1"/><rect x="2" y="15" width="20" height="6" rx="1"/><path d="M12 9v6"/></svg>
                  </div>
                  <span className="tree-label" style={{ fontWeight: 600, color: 'var(--text-bright)' }}>{cluster?.cluster_name || 'pg-cluster'}</span>
                  <span className={`tree-status ${nodesUp === nodes.length && nodes.length > 0 ? 'ok' : 'err'}`}></span>
                </div>

                {expanded.cluster && <div className="tree-children">
                  {/* Nodes under cluster */}
                  {nodes.filter(n => !sidebarFilter || n.name.toLowerCase().includes(sidebarFilter.toLowerCase())).map((node, i) => {
                    const p = node.patroni || {};
                    const isLeader = p.role === 'master' || p.role === 'primary';
                    const isRunning = p.state === 'running';
                    return (
                      <div key={i} className="tree-node">
                        <div className={`tree-row ${view.type === 'node' && view.name === node.name ? 'active' : ''}`}
                             onClick={() => setView({ type: 'node', name: node.name, tab: 'summary' })}>
                          <div className="tree-indent"></div>
                          <div className="tree-arrow hidden">&#9654;</div>
                          <div className="tree-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke={isRunning ? '#50c878' : '#e74c3c'} strokeWidth="2"><rect x="4" y="4" width="16" height="16" rx="2"/><line x1="9" y1="9" x2="9" y2="9.01" strokeWidth="3" strokeLinecap="round"/><line x1="15" y1="9" x2="15" y2="9.01" strokeWidth="3" strokeLinecap="round"/><path d="M4 15h16"/></svg>
                          </div>
                          <span className="tree-label">{node.name}</span>
                          {isRunning ? (
                            <span className={`tree-badge ${isLeader ? 'leader' : 'replica'}`}>{isLeader ? 'Leader' : 'Replica'}</span>
                          ) : (
                            <span className="tree-badge down">offline</span>
                          )}
                        </div>
                      </div>
                    );
                  })}

                  {/* Databases under cluster */}
                  {(databases || []).filter(db => !sidebarFilter || db.datname.toLowerCase().includes(sidebarFilter.toLowerCase())).map((db, i) => (
                    <div key={`db-${i}`} className="tree-node">
                      <div className="tree-row" onClick={() => setView({ type: 'cluster', tab: 'summary' })}>
                        <div className="tree-indent"></div>
                        <div className="tree-arrow hidden">&#9654;</div>
                        <div className="tree-icon">
                          <svg viewBox="0 0 24 24" fill="none" stroke="#f0ad4e" strokeWidth="2"><ellipse cx="12" cy="6" rx="8" ry="3"/><path d="M4 6v6c0 1.66 3.58 3 8 3s8-1.34 8-3V6"/><path d="M4 12v6c0 1.66 3.58 3 8 3s8-1.34 8-3v-6"/></svg>
                        </div>
                        <span className="tree-label">{db.datname}</span>
                      </div>
                    </div>
                  ))}
                </div>}
              </div>

            </div>

            <div style={{ padding: '10px 14px', borderTop: '1px solid var(--border-subtle)', fontSize: 12, color: 'var(--text-faint)', background: 'var(--bg-sidebar)' }}>
              {cluster?.vip && <div>VIP: {cluster.vip}:{cluster.pg_port}</div>}
              <div style={{ marginTop: 2 }}>{nodesUp}/{nodes.length} nodes online</div>
            </div>
          </div>

          {/* Main Content */}
          <div className="main">
            <div className="content-header">
              <div className="breadcrumb">
                {breadcrumb.map((b, i) => (
                  <React.Fragment key={i}>
                    {i > 0 && <span className="sep">/</span>}
                    {b.onClick ? <span style={{ cursor: 'pointer', color: 'var(--accent)' }} onClick={b.onClick}>{b.label}</span> : <strong>{b.label}</strong>}
                  </React.Fragment>
                ))}
              </div>
            </div>

            <div className="tabs">
              {currentTabs.map(tab => (
                <div key={tab} className={`tab ${view.tab === tab ? 'active' : ''}`}
                     onClick={() => setView(v => ({ ...v, tab }))}>
                  {tab.charAt(0).toUpperCase() + tab.slice(1)}
                </div>
              ))}
            </div>

            <div className="tab-content">
              {view.type === 'cluster' && view.tab === 'summary' && <SummaryTab cluster={cluster} connections={connections} replication={replication} system={system} databases={databases} />}
              {view.type === 'cluster' && view.tab === 'nodes' && <NodesTab cluster={cluster} replication={replication} connections={connections} />}
              {view.type === 'cluster' && view.tab === 'settings' && <SettingsTab />}
              {view.type === 'cluster' && view.tab === 'backups' && <BackupsTab />}
              {view.type === 'node' && view.tab === 'summary' && <NodeDetailTab node={selectedNode} systemData={system} />}
            </div>
          </div>
          </div>{/* /body-row */}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
