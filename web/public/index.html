<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PostgreSQL Cluster Monitor</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* === Theme variables === */
    :root, [data-theme="dark"] {
      --bg-base: #181818; --bg-panel: #1e1e1e; --bg-topbar: #2a2a2a; --bg-sidebar: #161616;
      --bg-input: #141414; --bg-task-log: #141414; --bg-hover: rgba(255,255,255,0.04);
      --bg-active: rgba(249,115,22,0.15); --bg-btn: #2a2a2a; --bg-btn-hover: #383838;
      --border: #383838; --border-subtle: #2a2a2a;
      --text: #d4d4d4; --text-bright: #eeeeee; --text-muted: #a0a0a0; --text-dim: #787878; --text-faint: #585858;
      --accent: #f97316; --accent-hover: #fb923c;
      --ok: #50c878; --warn: #f0ad4e; --err: #e74c3c; --info: #fb923c; --purple: #bb86fc;
      --toast-ok-bg: #2d6a4f; --toast-ok-text: #b7e4c7; --toast-ok-border: #40916c;
      --toast-err-bg: #6a2d2d; --toast-err-text: #e4b7b7; --toast-err-border: #914040;
      --overlay: rgba(0,0,0,0.6); --shadow: rgba(0,0,0,0.5);
      --gauge-track: #2a2a2a; --th-bg: rgba(0,0,0,0.15); --row-hover: rgba(249,115,22,0.04);
    }
    [data-theme="light"] {
      --bg-base: #f0f0f5; --bg-panel: #ffffff; --bg-topbar: #ffffff; --bg-sidebar: #f5f5fa;
      --bg-input: #ffffff; --bg-task-log: #f8f8fc; --bg-hover: rgba(0,0,0,0.04);
      --bg-active: rgba(249,115,22,0.12); --bg-btn: #e8e8f0; --bg-btn-hover: #d8d8e4;
      --border: #d0d0dc; --border-subtle: #e0e0ea;
      --text: #3a3a4a; --text-bright: #1a1a2a; --text-muted: #6a6a80; --text-dim: #8888a0; --text-faint: #a0a0b4;
      --accent: #ea580c; --accent-hover: #c2410c;
      --ok: #2d9655; --warn: #c88d20; --err: #d63030; --info: #ea580c; --purple: #8b5cf6;
      --toast-ok-bg: #d4edda; --toast-ok-text: #155724; --toast-ok-border: #a3d9b1;
      --toast-err-bg: #f8d7da; --toast-err-text: #721c24; --toast-err-border: #f5c6cb;
      --overlay: rgba(0,0,0,0.3); --shadow: rgba(0,0,0,0.15);
      --gauge-track: #e0e0ea; --th-bg: rgba(0,0,0,0.04); --row-hover: rgba(249,115,22,0.04);
    }
    [data-theme="nord-dark"] {
      --bg-base: #2e3440; --bg-panel: #3b4252; --bg-topbar: #434c5e; --bg-sidebar: #2e3440;
      --bg-input: #2e3440; --bg-task-log: #2e3440; --bg-hover: rgba(255,255,255,0.05);
      --bg-active: rgba(208,135,112,0.18); --bg-btn: #434c5e; --bg-btn-hover: #4c566a;
      --border: #4c566a; --border-subtle: #3b4252;
      --text: #d8dee9; --text-bright: #eceff4; --text-muted: #a0aec0; --text-dim: #7b88a1; --text-faint: #5c6a82;
      --accent: #d08770; --accent-hover: #c07860;
      --ok: #a3be8c; --warn: #ebcb8b; --err: #bf616a; --info: #d08770; --purple: #b48ead;
      --toast-ok-bg: #3b4a3e; --toast-ok-text: #a3be8c; --toast-ok-border: #5a7a5e;
      --toast-err-bg: #4a3638; --toast-err-text: #bf616a; --toast-err-border: #7a4a4e;
      --overlay: rgba(0,0,0,0.5); --shadow: rgba(0,0,0,0.4);
      --gauge-track: #434c5e; --th-bg: rgba(0,0,0,0.12); --row-hover: rgba(208,135,112,0.05);
    }
    [data-theme="nord-light"] {
      --bg-base: #eceff4; --bg-panel: #ffffff; --bg-topbar: #e5e9f0; --bg-sidebar: #e5e9f0;
      --bg-input: #ffffff; --bg-task-log: #f0f4f8; --bg-hover: rgba(0,0,0,0.03);
      --bg-active: rgba(191,97,106,0.12); --bg-btn: #d8dee9; --bg-btn-hover: #c8d0de;
      --border: #c8d0de; --border-subtle: #d8dee9;
      --text: #3b4252; --text-bright: #2e3440; --text-muted: #5e6a80; --text-dim: #7b88a1; --text-faint: #9aa4b8;
      --accent: #c06840; --accent-hover: #a85830;
      --ok: #689a5b; --warn: #c08b30; --err: #bf616a; --info: #c06840; --purple: #b48ead;
      --toast-ok-bg: #d8edda; --toast-ok-text: #2a5a2e; --toast-ok-border: #a3d4a8;
      --toast-err-bg: #f0d0d4; --toast-err-text: #6a2028; --toast-err-border: #daa0a8;
      --overlay: rgba(0,0,0,0.25); --shadow: rgba(0,0,0,0.1);
      --gauge-track: #d8dee9; --th-bg: rgba(0,0,0,0.03); --row-hover: rgba(94,129,172,0.05);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; background: var(--bg-base); color: var(--text); font-size: 13px; overflow: hidden; height: 100vh; }

    /* === Layout === */
    .layout { display: flex; flex-direction: column; height: 100vh; }
    .topbar { height: 48px; flex-shrink: 0; background: var(--bg-topbar); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 10; }
    .body-row { display: flex; flex: 1; overflow: hidden; }
    .sidebar { background: var(--bg-sidebar); border-right: 1px solid var(--border-subtle); overflow-y: auto; padding: 0; flex-shrink: 0; min-width: 180px; max-width: 500px; position: relative; }
    .sidebar-resize { position: absolute; top: 0; right: -3px; width: 6px; height: 100%; cursor: col-resize; z-index: 5; }
    .sidebar-resize:hover, .sidebar-resize.dragging { background: rgba(249,115,22,0.4); }
    .main { background: var(--bg-base); overflow-y: auto; flex: 1; min-width: 0; }

    /* === Topbar === */
    .topbar-left { display: flex; align-items: center; gap: 10px; }
    .topbar-logo { width: 30px; height: 30px; background: var(--accent); border-radius: 5px; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #fff; font-size: 16px; }
    .topbar-title { font-size: 16px; font-weight: 600; color: var(--text-bright); letter-spacing: 0.3px; }
    .topbar-right { display: flex; align-items: center; gap: 16px; font-size: 13px; color: var(--text-muted); }
    .topbar-status { display: flex; align-items: center; gap: 6px; }
    .status-indicator { width: 8px; height: 8px; border-radius: 50%; }
    .status-indicator.ok { background: var(--ok); box-shadow: 0 0 6px rgba(80,200,120,0.4); }
    .status-indicator.warn { background: var(--warn); box-shadow: 0 0 6px rgba(240,173,78,0.4); }
    .status-indicator.err { background: var(--err); box-shadow: 0 0 6px rgba(231,76,60,0.4); }

    /* === Sidebar Tree (Proxmox-style) === */
    .tree-search { padding: 6px 8px; }
    .tree-search input { width: 100%; padding: 5px 8px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 3px; color: var(--text); font-size: 12px; font-family: inherit; }
    .tree-search input:focus { outline: none; border-color: var(--accent); }
    .tree-search input::placeholder { color: var(--text-faint); }
    .tree-node { user-select: none; }
    .tree-row { display: flex; align-items: center; height: 26px; cursor: pointer; transition: background 0.1s; padding-right: 8px; }
    .tree-row:hover { background: var(--bg-hover); }
    .tree-row.active { background: var(--bg-active); }
    .tree-indent { display: inline-block; width: 20px; flex-shrink: 0; }
    .tree-arrow { width: 18px; height: 26px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 8px; color: var(--text-dim); transition: transform 0.15s; }
    .tree-arrow.open { transform: rotate(90deg); }
    .tree-arrow.hidden { visibility: hidden; }
    .tree-icon { width: 20px; height: 26px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .tree-icon svg, .tree-icon img { width: 16px; height: 16px; }
    .tree-label { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 12px; padding-left: 4px; }
    .tree-row.active .tree-label { color: var(--text-bright); font-weight: 500; }
    .tree-badge { font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 600; margin-left: 4px; letter-spacing: 0.3px; }
    .tree-badge.leader { background: rgba(80,200,120,0.2); color: var(--ok); }
    .tree-badge.replica { background: rgba(249,115,22,0.2); color: var(--info); }
    .tree-badge.down { background: rgba(231,76,60,0.2); color: var(--err); }
    .tree-status { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-left: auto; }
    .tree-status.ok { background: var(--ok); }
    .tree-status.err { background: var(--err); }
    .tree-children { overflow: hidden; }
    .tree-sep { height: 1px; background: var(--border-subtle); margin: 4px 0; }

    /* === Content area === */
    .content { padding: 0; }
    .content-header { padding: 14px 20px; background: var(--bg-panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 13px; }
    .breadcrumb span { color: var(--text-muted); }
    .breadcrumb strong { color: var(--text-bright); font-weight: 600; }
    .breadcrumb .sep { color: var(--text-faint); }

    /* === Tabs === */
    .tabs { display: flex; background: var(--bg-panel); border-bottom: 1px solid var(--border); padding: 0 20px; }
    .tab { padding: 10px 18px; font-size: 13px; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }
    .tab-content { padding: 20px; }

    /* === Panels & Tables === */
    .panel { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 4px; margin-bottom: 16px; }
    .panel-header { padding: 10px 14px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; justify-content: space-between; }
    .panel-body { padding: 14px; }
    .panel-grid { display: grid; gap: 16px; }
    .panel-grid.cols-2 { grid-template-columns: 1fr 1fr; }
    .panel-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
    .panel-grid.cols-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }

    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; font-size: 11px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 12px; background: var(--th-bg); border-bottom: 1px solid var(--border); }
    td { padding: 8px 12px; border-bottom: 1px solid var(--border-subtle); font-size: 13px; }
    tr:hover td { background: var(--row-hover); }
    tr:last-child td { border-bottom: none; }

    /* === Gauge (Proxmox-style circular) === */
    .gauge-container { display: flex; flex-direction: column; align-items: center; padding: 10px; }
    .gauge-svg { width: 100px; height: 100px; }
    .gauge-label { margin-top: 8px; font-size: 12px; color: var(--text-muted); text-align: center; }
    .gauge-value { font-size: 18px; font-weight: 700; color: var(--text-bright); }

    /* === Key-value rows === */
    .kv-table { width: 100%; }
    .kv-table tr td:first-child { color: var(--text-muted); width: 140px; font-size: 12px; }
    .kv-table tr td:last-child { color: var(--text-bright); }
    .kv-table tr td { padding: 5px 12px; border-bottom: 1px solid var(--border-subtle); }

    /* === Data tables === */
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th { text-align: left; padding: 6px 12px; font-size: 11px; font-weight: 600; color: var(--text-muted); background: var(--th-bg); border-bottom: 1px solid var(--border); }
    .data-table td { padding: 8px 12px; border-bottom: 1px solid var(--border-subtle); font-size: 12px; }
    .data-table tr:hover td { background: var(--row-hover); }

    /* === Badges === */
    .badge { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 11px; font-weight: 600; }
    .badge.ok { background: rgba(80,200,120,0.15); color: var(--ok); }
    .badge.warn { background: rgba(240,173,78,0.15); color: var(--warn); }
    .badge.err { background: rgba(231,76,60,0.15); color: var(--err); }
    .badge.info { background: rgba(249,115,22,0.15); color: var(--info); }
    .badge.purple { background: rgba(155,89,182,0.15); color: var(--purple); }

    /* === Buttons === */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 5px 14px; border-radius: 3px; border: 1px solid var(--border); background: var(--bg-btn); color: var(--text); font-size: 12px; cursor: pointer; transition: all 0.15s; font-family: inherit; }
    .btn:hover { background: var(--bg-btn-hover); border-color: var(--border); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn.primary:hover { background: var(--accent-hover); }
    .btn.danger { background: rgba(231,76,60,0.15); border-color: var(--err); color: var(--err); }
    .btn.danger:hover { background: rgba(231,76,60,0.25); }

    /* === Progress bar === */
    .progress { background: var(--gauge-track); border-radius: 2px; height: 6px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
    .progress-fill.ok { background: var(--ok); }
    .progress-fill.warn { background: var(--warn); }
    .progress-fill.err { background: var(--err); }

    /* === Backup rows === */
    .backup-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border-subtle); }
    .backup-row:last-child { border-bottom: none; }
    .backup-name { font-family: 'SF Mono', Consolas, monospace; font-size: 12px; color: var(--text-bright); }
    .backup-time { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

    /* === Modal === */
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--overlay); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .modal { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 6px; padding: 20px; max-width: 440px; width: 90%; }
    .modal h3 { font-size: 15px; color: var(--text-bright); margin-bottom: 10px; }
    .modal p { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; line-height: 1.5; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

    /* === Toast === */
    .toast { position: fixed; bottom: 16px; right: 16px; padding: 10px 18px; border-radius: 4px; font-size: 12px; z-index: 200; animation: slideIn 0.3s; }
    .toast.success { background: var(--toast-ok-bg); color: var(--toast-ok-text); border: 1px solid var(--toast-ok-border); }
    .toast.error { background: var(--toast-err-bg); color: var(--toast-err-text); border: 1px solid var(--toast-err-border); }
    @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .empty { color: var(--text-faint); font-style: italic; padding: 20px; text-align: center; }

    /* === Form inputs === */
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 4px; font-weight: 500; }
    .form-group input, .form-group select { width: 100%; padding: 7px 10px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 3px; color: var(--text-bright); font-size: 13px; font-family: inherit; }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--accent); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .storage-status { display: flex; align-items: center; gap: 8px; }
    .storage-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .storage-dot.mounted { background: var(--ok); box-shadow: 0 0 6px rgba(80,200,120,0.4); }
    .storage-dot.unmounted { background: var(--err); box-shadow: 0 0 6px rgba(231,76,60,0.4); }
    .storage-dot.none { background: var(--text-faint); }

    /* === Task Viewer (Proxmox-style) === */
    .task-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--overlay); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .task-viewer { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 6px; width: 700px; max-width: 95vw; max-height: 80vh; display: flex; flex-direction: column; box-shadow: 0 8px 32px var(--shadow); }
    .task-viewer-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--bg-topbar); border-radius: 6px 6px 0 0; }
    .task-viewer-header h3 { font-size: 14px; color: var(--text-bright); font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .task-viewer-close { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 18px; padding: 2px 6px; border-radius: 3px; }
    .task-viewer-close:hover { background: var(--bg-hover); color: var(--text-bright); }
    .task-viewer-log { flex: 1; overflow-y: auto; padding: 12px 16px; font-family: 'SF Mono', Consolas, 'Liberation Mono', monospace; font-size: 12px; line-height: 1.6; background: var(--bg-task-log); min-height: 250px; max-height: 55vh; }
    .task-viewer-log .log-line { color: var(--text-muted); white-space: pre-wrap; word-break: break-all; }
    .task-viewer-log .log-line.ok { color: var(--ok); font-weight: 600; }
    .task-viewer-log .log-line.err { color: var(--err); font-weight: 600; }
    .task-viewer-footer { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; font-size: 13px; }
    .task-spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* === Settings === */
    .theme-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .theme-card { padding: 12px; border: 2px solid var(--border); border-radius: 6px; cursor: pointer; text-align: center; transition: all 0.15s; }
    .theme-card:hover { border-color: var(--text-dim); }
    .theme-card.active { border-color: var(--accent); }
    .theme-card-preview { height: 40px; border-radius: 3px; margin-bottom: 8px; display: flex; overflow: hidden; }
    .theme-card-preview > div { flex: 1; }
    .theme-card-label { font-size: 11px; font-weight: 600; color: var(--text-muted); }

    @media (max-width: 900px) {
      .sidebar { display: none; }
      .sidebar-resize { display: none; }
      .panel-grid.cols-3, .panel-grid.cols-4 { grid-template-columns: 1fr 1fr; }
      .theme-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <script>try{document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||'dark')}catch(e){}</script>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo, useRef } = React;

    function GithubStars() {
      const [stars, setStars] = useState(null);
      useEffect(() => {
        fetch('https://api.github.com/repos/iadityaharsh/postgresql-cluster')
          .then(r => r.json())
          .then(d => { if (d.stargazers_count !== undefined) setStars(d.stargazers_count); })
          .catch(() => {});
      }, []);
      if (stars === null) return null;
      return (
        <span style={{ display: 'flex', alignItems: 'center', gap: 3, color: 'var(--warn)', fontSize: 11, marginLeft: 2 }}>
          <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.75.75 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25z"/></svg>
          {stars}
        </span>
      );
    }

    function VersionBadge() {
      const [ver, setVer] = useState({ current: null, latest: null, update_available: false, checking: false, nodes: [], all_nodes_match: true });
      const [taskViewer, setTaskViewer] = useState(null);
      const [showNodes, setShowNodes] = useState(false);

      useEffect(() => {
        fetch('/api/version').then(r => r.json()).then(d => setVer(v => ({ ...v, current: d.version }))).catch(() => {});
      }, []);

      const checkForUpdates = async () => {
        setVer(v => ({ ...v, checking: true, error: null }));
        try {
          const data = await fetch('/api/version/check').then(r => r.json());
          setVer({ current: data.current, latest: data.latest, update_available: data.update_available, checking: false, nodes: data.nodes || [], all_nodes_match: data.all_nodes_match !== false, error: data.error || null });
        } catch (e) { setVer(v => ({ ...v, checking: false, error: e.message })); }
      };

      const startUpgrade = async () => {
        try {
          const resp = await fetch('/api/version/upgrade', { method: 'POST' });
          if (resp.ok) {
            setTaskViewer({ title: `Upgrading cluster to ${ver.latest}`, statusUrl: '/api/version/upgrade/status' });
          }
        } catch {}
      };

      const statusText = () => {
        if (ver.checking) return 'Checking...';
        if (ver.error) return 'Check failed — retry';
        if (ver.latest && !ver.update_available) {
          if (ver.all_nodes_match) return `Up to date (v${ver.latest})`;
          return 'Nodes out of sync';
        }
        return 'Check for updates';
      };

      const statusColor = () => {
        if (!ver.latest || ver.update_available) return undefined;
        return ver.all_nodes_match ? 'var(--ok)' : 'var(--warn)';
      };

      return (
        <>
          <div style={{ position: 'relative', display: 'inline-flex', alignItems: 'center', gap: 6 }}>
            {ver.current && <span style={{ fontSize: 11, color: 'var(--text-dim)', fontWeight: 400 }}>v{ver.current}</span>}
            {ver.update_available ? (
              <button className="btn" onClick={startUpgrade}
                style={{ padding: '3px 10px', fontSize: 11, background: 'var(--accent)', borderColor: 'var(--accent)', color: '#fff', animation: 'none' }}>
                Upgrade to v{ver.latest}
              </button>
            ) : (
              <button className="btn" onClick={checkForUpdates} disabled={ver.checking}
                onMouseEnter={() => ver.nodes.length > 0 && setShowNodes(true)}
                onMouseLeave={() => setShowNodes(false)}
                style={{ padding: '3px 10px', fontSize: 11, borderColor: statusColor() || undefined, color: statusColor() || undefined }}>
                {statusText()}
              </button>
            )}
            {showNodes && ver.nodes.length > 0 && (
              <div style={{ position: 'absolute', top: '100%', right: 0, marginTop: 6, background: 'var(--bg-panel)', border: '1px solid var(--border)', borderRadius: 4, padding: 8, zIndex: 100, minWidth: 200, fontSize: 11, boxShadow: '0 4px 12px var(--shadow)' }}>
                {ver.nodes.map(n => (
                  <div key={n.name} style={{ display: 'flex', justifyContent: 'space-between', padding: '3px 0', gap: 12 }}>
                    <span style={{ color: 'var(--text-bright)' }}>{n.name}</span>
                    <span style={{ color: n.version === ver.current ? 'var(--ok)' : 'var(--warn)', fontFamily: 'monospace' }}>v{n.version}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
          {taskViewer && (
            <TaskViewer title={taskViewer.title} statusUrl={taskViewer.statusUrl} autoReload
              onClose={() => { setTaskViewer(null); window.location.reload(); }} />
          )}
        </>
      );
    }

    function formatBytes(bytes) {
      if (!bytes || bytes === 0) return '0 B';
      const k = 1024, sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
    }

    function formatUptime(seconds) {
      if (!seconds) return '-';
      const d = Math.floor(seconds / 86400), h = Math.floor((seconds % 86400) / 3600), m = Math.floor((seconds % 3600) / 60);
      if (d > 0) return `${d}d ${h}h ${m}m`;
      if (h > 0) return `${h}h ${m}m`;
      return `${m}m`;
    }

    function formatDate(d) {
      if (!d) return '-';
      return new Date(d).toLocaleString();
    }

    function Gauge({ percent, label, detail, size = 90 }) {
      const p = Math.min(100, Math.max(0, parseFloat(percent) || 0));
      const r = (size - 10) / 2;
      const circ = 2 * Math.PI * r;
      const offset = circ - (p / 100) * circ;
      const color = p > 80 ? '#e74c3c' : p > 60 ? '#f0ad4e' : '#50c878';
      return (
        <div className="gauge-container">
          <svg className="gauge-svg" width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#2d2d44" strokeWidth="6" />
            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="6"
              strokeDasharray={circ} strokeDashoffset={offset}
              strokeLinecap="round" transform={`rotate(-90 ${size/2} ${size/2})`}
              style={{ transition: 'stroke-dashoffset 0.5s' }} />
            <text x={size/2} y={size/2 - 2} textAnchor="middle" fill="#e8e8f0" fontSize="16" fontWeight="700">{p.toFixed(0)}%</text>
            <text x={size/2} y={size/2 + 14} textAnchor="middle" fill="#7878a0" fontSize="9">{detail || ''}</text>
          </svg>
          <div className="gauge-label">{label}</div>
        </div>
      );
    }

    function Badge({ type, text }) {
      return <span className={`badge ${type}`}>{text}</span>;
    }

    function Toast({ message, type, onClose }) {
      useEffect(() => { const t = setTimeout(onClose, 4000); return () => clearTimeout(t); }, [onClose]);
      return <div className={`toast ${type}`}>{message}</div>;
    }

    function ConfirmModal({ title, message, confirmText, confirmClass, onConfirm, onCancel }) {
      return (
        <div className="modal-overlay" onClick={onCancel}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <h3>{title}</h3>
            <p>{message}</p>
            <div className="modal-actions">
              <button className="btn" onClick={onCancel}>Cancel</button>
              <button className={`btn ${confirmClass || 'primary'}`} onClick={onConfirm}>{confirmText}</button>
            </div>
          </div>
        </div>
      );
    }

    // ========== Tab: Summary ==========
    function SummaryTab({ cluster, connections, replication, system, databases }) {
      const nodes = cluster?.nodes || [];
      const nodesUp = nodes.filter(n => n.patroni?.state === 'running').length;
      const leader = nodes.find(n => n.patroni?.role === 'master' || n.patroni?.role === 'primary');
      const replicas = nodes.filter(n => n.patroni?.state === 'running' && n.name !== leader?.name);
      const [switching, setSwitching] = React.useState(false);
      const [switchTarget, setSwitchTarget] = React.useState('');
      const [toast, setToast] = React.useState(null);
      const connTotal = connections?.by_state?.reduce((s, c) => s + parseInt(c.count), 0) || 0;
      const connMax = connections?.max_connections || 0;
      const connPct = connMax ? ((connTotal / connMax) * 100) : 0;

      const handleSwitchover = async () => {
        if (switching || !switchTarget) return;
        setSwitching(true);
        try {
          const r = await fetch('/api/cluster/switchover', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ target: switchTarget })
          });
          const data = await r.json();
          if (r.ok) {
            setToast({ message: data.message, type: 'success' });
            setSwitchTarget('');
          } else {
            setToast({ message: data.error || 'Switchover failed', type: 'error' });
          }
        } catch (err) {
          setToast({ message: err.message, type: 'error' });
        }
        setSwitching(false);
      };

      return (
        <div>
          <div className="panel">
            <div className="panel-header">Status</div>
            <div className="panel-body">
              <div className="panel-grid cols-4">
                <Gauge percent={(nodesUp / (nodes.length || 1)) * 100} label="Nodes Online" detail={`${nodesUp} / ${nodes.length}`} />
                <Gauge percent={connPct} label="Connections" detail={`${connTotal} / ${connMax}`} />
                <Gauge percent={replicas.length > 0 ? 100 : 0} label="Replication" detail={`${replicas.length} streaming`} />
                <div className="gauge-container">
                  <div style={{ textAlign: 'center', padding: '10px 0' }}>
                    <div style={{ fontSize: 28, fontWeight: 700, color: leader ? '#50c878' : '#e74c3c' }}>{leader ? leader.name : 'NONE'}</div>
                    <div style={{ fontSize: 12, color: 'var(--text-dim)', marginTop: 4 }}>{leader?.ip || 'no leader'}</div>
                    {leader && replicas.length > 0 && (
                      <div style={{ marginTop: 8, display: 'flex', gap: 4, justifyContent: 'center', alignItems: 'center' }}>
                        <select value={switchTarget} onChange={e => setSwitchTarget(e.target.value)}
                          style={{ fontSize: 11, padding: '3px 6px', background: 'var(--panel)', color: 'var(--text)', border: '1px solid var(--border)', borderRadius: 4 }}>
                          <option value="">Switch to...</option>
                          {replicas.map(n => <option key={n.name} value={n.name}>{n.name}</option>)}
                        </select>
                        <button onClick={handleSwitchover} disabled={switching || !switchTarget}
                          style={{ padding: '3px 10px', fontSize: 11, background: switchTarget ? 'var(--accent)' : 'var(--border)', color: '#fff', border: 'none', borderRadius: 4, cursor: switching || !switchTarget ? 'default' : 'pointer', opacity: switching ? 0.6 : 1 }}>
                          {switching ? 'Switching...' : 'Switch'}
                        </button>
                      </div>
                    )}
                  </div>
                  <div className="gauge-label">Current Leader</div>
                </div>
              </div>
            </div>
          </div>

          <div className="panel-grid cols-2">
            <div className="panel">
              <div className="panel-header">Cluster Info</div>
              <div className="panel-body" style={{ padding: 0 }}>
                <table className="kv-table">
                  <tbody>
                    <tr><td>Cluster Name</td><td>{cluster?.cluster_name || '-'}</td></tr>
                    <tr><td>Virtual IP</td><td style={{ fontFamily: 'monospace' }}>{cluster?.vip ? `${cluster.vip}:${cluster.pg_port}` : 'Disabled'}</td></tr>
                    <tr><td>Total Nodes</td><td>{nodes.length}</td></tr>
                    <tr><td>Databases</td><td>{databases?.length || 0}</td></tr>
                    <tr><td>Max Connections</td><td>{connMax}</td></tr>
                  </tbody>
                </table>
              </div>
            </div>

            <div className="panel">
              <div className="panel-header">Databases</div>
              <div className="panel-body" style={{ padding: 0 }}>
                <table>
                  <thead><tr><th>Name</th><th>Size</th><th>Connections</th></tr></thead>
                  <tbody>
                    {(databases || []).map((db, i) => (
                      <tr key={i}>
                        <td style={{ fontWeight: 500 }}>{db.datname}</td>
                        <td>{formatBytes(parseInt(db.size_bytes))}</td>
                        <td>{db.connections}</td>
                      </tr>
                    ))}
                    {(!databases || databases.length === 0) && <tr><td colSpan="3" className="empty">No databases</td></tr>}
                  </tbody>
                </table>
              </div>
            </div>
          </div>

          {system && system.length > 0 && (
            <div className="panel" style={{ marginTop: 16 }}>
              <div className="panel-header">System Resources</div>
              <div className="panel-body">
                <div className="panel-grid cols-3">
                  {system.map((s, i) => (
                    <div key={i} style={{ background: 'var(--bg-input)', borderRadius: 4, padding: 12, border: '1px solid var(--border-subtle)' }}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10 }}>
                        <span style={{ color: s.error ? '#e74c3c' : '#50c878', fontSize: 10 }}>&#9679;</span>
                        <span style={{ fontWeight: 600, color: 'var(--text-bright)' }}>{s.hostname || s.name}</span>
                      </div>
                      {s.error ? <div style={{ color: 'var(--err)', fontSize: 12 }}>Unreachable</div> : (
                        <div>
                          <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, marginBottom: 3 }}>
                            <span>Memory</span><span>{s.memory?.used_percent}%</span>
                          </div>
                          <div className="progress">
                            <div className={`progress-fill ${parseFloat(s.memory?.used_percent) > 80 ? 'err' : parseFloat(s.memory?.used_percent) > 60 ? 'warn' : 'ok'}`}
                                 style={{ width: `${s.memory?.used_percent}%` }} />
                          </div>
                          <div style={{ fontSize: 11, color: 'var(--text-dim)', marginTop: 3 }}>
                            {formatBytes(s.memory?.total_bytes - s.memory?.free_bytes)} / {formatBytes(s.memory?.total_bytes)}
                          </div>
                          <div style={{ marginTop: 8, display: 'flex', justifyContent: 'space-between', fontSize: 12 }}>
                            <span>CPU: {s.cpu_count} cores</span>
                            <span style={{ color: 'var(--text-dim)' }}>Load: {s.load_avg?.['1m']?.toFixed(2) ?? 'N/A'}</span>
                          </div>
                          <div style={{ marginTop: 4, fontSize: 11, color: 'var(--text-dim)' }}>Uptime: {formatUptime(s.uptime_seconds)}</div>
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}
          {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
        </div>
      );
    }

    // ========== Tab: Nodes ==========
    function NodesTab({ cluster, replication, connections }) {
      const nodes = cluster?.nodes || [];
      const connTotal = connections?.by_state?.reduce((s, c) => s + parseInt(c.count), 0) || 0;
      const connMax = connections?.max_connections || 0;
      const connPct = connMax ? ((connTotal / connMax) * 100) : 0;
      return (
        <div>
          <div className="panel">
            <div className="panel-header">Cluster Members</div>
            <div className="panel-body" style={{ padding: 0 }}>
              <table>
                <thead>
                  <tr><th>Node</th><th>IP Address</th><th>Role</th><th>State</th><th>PostgreSQL</th><th>Timeline</th><th>Replication</th></tr>
                </thead>
                <tbody>
                  {nodes.map((node, i) => {
                    const p = node.patroni || {};
                    const role = p.role || 'unknown';
                    const state = p.state || 'unknown';
                    const isLeader = role === 'master' || role === 'primary';
                    const isRunning = state === 'running';
                    return (
                      <tr key={i}>
                        <td style={{ fontWeight: 600 }}>{node.name}</td>
                        <td style={{ fontFamily: 'Consolas, monospace', fontSize: 12 }}>{node.ip}</td>
                        <td><Badge type={isLeader ? 'ok' : 'info'} text={isLeader ? 'Leader' : 'Replica'} /></td>
                        <td><Badge type={isRunning ? 'ok' : 'err'} text={state} /></td>
                        <td>{p.server_version || '-'}</td>
                        <td>{p.timeline || '-'}</td>
                        <td>{p.replication_state || (isLeader ? '-' : 'streaming')}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>

          <div className="panel">
            <div className="panel-header">Replication Status</div>
            <div className="panel-body" style={{ padding: 0 }}>
              <table>
                <thead><tr><th>Client Address</th><th>State</th><th>Sent LSN</th><th>Replay LSN</th><th>Lag</th></tr></thead>
                <tbody>
                  {(replication || []).map((r, i) => (
                    <tr key={i}>
                      <td style={{ fontFamily: 'Consolas, monospace', fontSize: 12 }}>{r.client_addr}</td>
                      <td><Badge type={r.state === 'streaming' ? 'ok' : 'warn'} text={r.state} /></td>
                      <td style={{ fontFamily: 'monospace', fontSize: 12 }}>{r.sent_lsn || '-'}</td>
                      <td style={{ fontFamily: 'monospace', fontSize: 12 }}>{r.replay_lsn || '-'}</td>
                      <td>{formatBytes(parseInt(r.lag_bytes || 0))}</td>
                    </tr>
                  ))}
                  {(!replication || replication.length === 0) && <tr><td colSpan="5" className="empty">No replication data (this node may be a replica)</td></tr>}
                </tbody>
              </table>
            </div>
          </div>

          {connections?.by_state && (
            <div className="panel-grid cols-2">
              <div className="panel">
                <div className="panel-header">Connection Usage</div>
                <div className="panel-body" style={{ display: 'flex', justifyContent: 'center' }}>
                  <Gauge percent={connPct} label="Connection Usage" detail={`${connTotal} / ${connMax}`} size={120} />
                </div>
              </div>
              <div className="panel">
                <div className="panel-header">Connections by State</div>
                <div className="panel-body" style={{ padding: 0 }}>
                  <table>
                    <thead><tr><th>State</th><th>Count</th><th>Percentage</th></tr></thead>
                    <tbody>
                      {connections.by_state.map((s, i) => {
                        const cnt = parseInt(s.count);
                        const p = connTotal ? ((cnt / connTotal) * 100).toFixed(1) : 0;
                        return (
                          <tr key={i}>
                            <td>{s.state || 'null'}</td>
                            <td style={{ fontWeight: 600 }}>{cnt}</td>
                            <td>
                              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                                <div className="progress" style={{ flex: 1 }}>
                                  <div className="progress-fill ok" style={{ width: `${p}%` }} />
                                </div>
                                <span style={{ fontSize: 11, color: 'var(--text-dim)', width: 36 }}>{p}%</span>
                              </div>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ========== Tab: Backups ==========
    function TaskViewer({ title, statusUrl, onClose, autoReload }) {
      const [log, setLog] = useState([]);
      const [running, setRunning] = useState(true);
      const [exitCode, setExitCode] = useState(null);
      const logRef = React.useRef(null);
      const lineCount = React.useRef(0);
      const sawSuccess = React.useRef(false);

      useEffect(() => {
        let active = true;
        const poll = async () => {
          if (!active) return;
          try {
            const resp = await fetch(`${statusUrl}?since=${lineCount.current}`);
            const data = await resp.json();
            if (data.log && data.log.length > 0) {
              setLog(prev => [...prev, ...data.log]);
              lineCount.current = data.totalLines;
            }
            if (data.exitCode === 0) sawSuccess.current = true;
            setRunning(data.running);
            setExitCode(data.exitCode);
            if (data.running) setTimeout(poll, 500);
            else if (autoReload && data.exitCode === 0) {
              setTimeout(() => window.location.reload(), 2000);
            }
          } catch {
            // Server went away — if we already saw success, it's the restart
            if (sawSuccess.current && autoReload) {
              setTimeout(() => window.location.reload(), 3000);
              return;
            }
            if (active) setTimeout(poll, 1000);
          }
        };
        poll();
        return () => { active = false; };
      }, [statusUrl]);

      useEffect(() => {
        if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight;
      }, [log]);

      const done = !running && exitCode !== null;
      const success = exitCode === 0;

      return (
        <div className="task-overlay" onClick={done ? onClose : undefined}>
          <div className="task-viewer" onClick={e => e.stopPropagation()}>
            <div className="task-viewer-header">
              <h3>
                {running && <span className="task-spinner" />}
                {!running && success && <span style={{ color: 'var(--ok)', fontSize: 16 }}>&#10003;</span>}
                {!running && !success && exitCode !== null && <span style={{ color: 'var(--err)', fontSize: 16 }}>&#10007;</span>}
                {title}
              </h3>
              <button className="task-viewer-close" onClick={onClose}>&times;</button>
            </div>
            <div className="task-viewer-log" ref={logRef}>
              {log.map((line, i) => {
                const isOk = line.includes('TASK OK');
                const isErr = line.includes('TASK ERROR') || line.includes('ERROR:');
                return <div key={i} className={`log-line ${isOk ? 'ok' : isErr ? 'err' : ''}`}>{line}</div>;
              })}
              {running && log.length === 0 && <div className="log-line">Waiting for output...</div>}
            </div>
            <div className="task-viewer-footer">
              <span style={{ color: running ? '#f0ad4e' : success ? '#50c878' : '#e74c3c' }}>
                {running ? 'Running...' : success ? 'Task completed successfully' : `Task failed (exit code ${exitCode})`}
              </span>
              <button className="btn" onClick={onClose}>{done ? 'Close' : 'Background'}</button>
            </div>
          </div>
        </div>
      );
    }

    // ========== Tunnel Routes (inline, rendered inside Remote Access panel) ==========
    function TunnelRoutesInline() {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [toast, setToast] = useState(null);
      const [showForm, setShowForm] = useState(false);
      const [editRoute, setEditRoute] = useState(null);
      const [form, setForm] = useState({ tunnel_id: '', hostname: '', service: '' });
      const [confirmDelete, setConfirmDelete] = useState(null);
      const [saving, setSaving] = useState(false);

      const fetchRoutes = useCallback(async () => {
        try {
          const d = await fetch('/api/tunnel/routes').then(r => r.json());
          setData(d);
        } catch {}
        setLoading(false);
      }, []);

      useEffect(() => { fetchRoutes(); }, [fetchRoutes]);

      const defaultService = 'tcp://VIP:5432';

      const openAdd = (tunnelId) => {
        setEditRoute(null);
        setForm({ tunnel_id: tunnelId, hostname: '', service: defaultService });
        setShowForm(true);
      };

      const openEdit = (tunnelId, route) => {
        setEditRoute(route.hostname);
        setForm({ tunnel_id: tunnelId, hostname: route.hostname, service: route.service });
        setShowForm(true);
      };

      const saveRoute = async () => {
        if (!form.hostname || !form.service) return setToast({ message: 'Hostname and service are required', type: 'error' });
        setSaving(true);
        try {
          const isEdit = editRoute != null;
          const url = isEdit ? `/api/tunnel/routes/${encodeURIComponent(editRoute)}` : '/api/tunnel/routes';
          const resp = await fetch(url, {
            method: isEdit ? 'PUT' : 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(form)
          });
          const d = await resp.json();
          if (resp.ok) {
            setToast({ message: d.message, type: 'ok' });
            setShowForm(false);
            fetchRoutes();
          } else {
            setToast({ message: d.error, type: 'error' });
          }
        } catch { setToast({ message: 'Request failed', type: 'error' }); }
        setSaving(false);
      };

      const deleteRoute = async (tunnelId, hostname) => {
        setConfirmDelete(null);
        try {
          const resp = await fetch(`/api/tunnel/routes/${encodeURIComponent(hostname)}`, {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ tunnel_id: tunnelId })
          });
          const d = await resp.json();
          if (resp.ok) { setToast({ message: d.message, type: 'ok' }); fetchRoutes(); }
          else setToast({ message: d.error, type: 'error' });
        } catch { setToast({ message: 'Delete failed', type: 'error' }); }
      };

      if (loading) return <div style={{ color: 'var(--text-muted)', padding: '8px 0' }}>Loading routes...</div>;

      if (!data?.available) return null;

      const tunnels = data.tunnels || [];
      if (tunnels.length === 0) return null;

      return (
        <div>
          {tunnels.map(tunnel => (
            <div key={tunnel.id} style={{ marginTop: 16 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
                <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-bright)' }}>
                  Public Hostnames
                  <span style={{ marginLeft: 8 }}>
                    {tunnel.status === 'healthy' ? <Badge type="ok" text="Healthy" /> : tunnel.status === 'inactive' ? <Badge type="warn" text="Inactive" /> : <Badge type="info" text={tunnel.status || 'Unknown'} />}
                  </span>
                  <span style={{ fontSize: 11, color: 'var(--text-dim)', marginLeft: 8, fontWeight: 400 }}>{tunnel.name} &middot; {tunnel.connectors} connector{tunnel.connectors !== 1 ? 's' : ''}</span>
                </div>
                <button className="btn primary" style={{ padding: '3px 10px', fontSize: 11 }} onClick={() => openAdd(tunnel.id)}>+ Add Route</button>
              </div>
              <table className="data-table" style={{ borderRadius: 4, overflow: 'hidden', border: '1px solid var(--border-subtle)' }}>
                <thead>
                  <tr>
                    <th>Hostname</th>
                    <th>Service</th>
                    <th style={{ width: 100 }}></th>
                  </tr>
                </thead>
                <tbody>
                  {(tunnel.routes || []).map(route => (
                    <tr key={route.hostname}>
                      <td style={{ fontFamily: 'monospace', fontSize: 12 }}>{route.hostname}</td>
                      <td style={{ fontFamily: 'monospace', fontSize: 12, color: 'var(--text-muted)' }}>{route.service}</td>
                      <td>
                        <div style={{ display: 'flex', gap: 4 }}>
                          <button className="btn" style={{ padding: '2px 8px', fontSize: 11 }} onClick={() => openEdit(tunnel.id, route)}>Edit</button>
                          <button className="btn" style={{ padding: '2px 8px', fontSize: 11, color: 'var(--err)' }} onClick={() => setConfirmDelete({ tunnelId: tunnel.id, hostname: route.hostname })}>Delete</button>
                        </div>
                      </td>
                    </tr>
                  ))}
                  {(tunnel.routes || []).length === 0 && (
                    <tr><td colSpan="3" style={{ textAlign: 'center', color: 'var(--text-dim)', padding: 16 }}>No public hostname routes configured</td></tr>
                  )}
                  <tr style={{ opacity: 0.5 }}>
                    <td style={{ fontSize: 11, color: 'var(--text-dim)' }}>* (catch-all)</td>
                    <td style={{ fontFamily: 'monospace', fontSize: 11, color: 'var(--text-dim)' }}>{tunnel.catch_all}</td>
                    <td></td>
                  </tr>
                </tbody>
              </table>
            </div>
          ))}

          {showForm && (
            <div className="modal-overlay" onClick={() => setShowForm(false)}>
              <div className="modal" onClick={e => e.stopPropagation()} style={{ maxWidth: 480 }}>
                <h3>{editRoute ? 'Edit Route' : 'Add Route'}</h3>
                <div style={{ marginTop: 12 }}>
                  <div className="form-group" style={{ marginBottom: 8 }}>
                    <label>Public Hostname</label>
                    <input type="text" value={form.hostname} onChange={e => setForm(f => ({ ...f, hostname: e.target.value }))}
                      placeholder="db.example.com" disabled={!!editRoute} />
                  </div>
                  <div className="form-group" style={{ marginBottom: 8 }}>
                    <label>Service</label>
                    <input type="text" value={form.service} onChange={e => setForm(f => ({ ...f, service: e.target.value }))}
                      placeholder="tcp://192.168.11.10:5432" />
                  </div>
                  <p style={{ fontSize: 11, color: 'var(--text-dim)', marginBottom: 12, lineHeight: 1.5 }}>
                    For PostgreSQL access: <code>tcp://VIP:5432</code>. For HTTP services: <code>http://localhost:PORT</code>.
                  </p>
                </div>
                <div className="modal-actions">
                  <button className="btn" onClick={() => setShowForm(false)}>Cancel</button>
                  <button className="btn primary" onClick={saveRoute} disabled={saving}>{saving ? 'Saving...' : editRoute ? 'Update' : 'Add'}</button>
                </div>
              </div>
            </div>
          )}

          {confirmDelete && (
            <ConfirmModal
              title="Delete Route"
              message={`Remove the public hostname route for ${confirmDelete.hostname}? This will disconnect any services using this route.`}
              confirmText="Delete"
              confirmClass="danger"
              onConfirm={() => deleteRoute(confirmDelete.tunnelId, confirmDelete.hostname)}
              onCancel={() => setConfirmDelete(null)}
            />
          )}

          {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
        </div>
      );
    }

    // ========== Hyperdrive Section ==========
    function HyperdriveSection({ collapsed, onToggle }) {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [toast, setToast] = useState(null);
      const [taskViewer, setTaskViewer] = useState(null);
      const [showForm, setShowForm] = useState(false);
      const [formDb, setFormDb] = useState('');
      const [form, setForm] = useState({ username: '', password: '', hostname: '', hyperdrive_name: '', access_client_id: '', access_client_secret: '' });
      const [creatingUser, setCreatingUser] = useState(false);
      const [confirmDelete, setConfirmDelete] = useState(null);
      const [updateKey, setUpdateKey] = useState(null);
      const [updatePassword, setUpdatePassword] = useState('');
      const [detailKey, setDetailKey] = useState(null);
      const [copiedId, setCopiedId] = useState(null);

      const fetchData = useCallback(async () => {
        try {
          const d = await fetch('/api/hyperdrive').then(r => r.json());
          setData(d);
        } catch {}
        setLoading(false);
      }, []);

      useEffect(() => { fetchData(); }, [fetchData]);

      const generatePassword = () => {
        const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let pw = '';
        for (let i = 0; i < 32; i++) pw += chars[Math.floor(Math.random() * chars.length)];
        setForm(f => ({ ...f, password: pw }));
      };

      const openSetup = (db) => {
        setFormDb(db);
        setForm({ username: `${db}_cf`, password: '', hostname: '', hyperdrive_name: '', access_client_id: '', access_client_secret: '' });
        generatePassword();
        setShowForm(true);
      };

      const createUser = async () => {
        if (!form.username || !form.password) return setToast({ message: 'Username and password required', type: 'error' });
        setCreatingUser(true);
        try {
          const resp = await fetch('/api/hyperdrive/create-user', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ database: formDb, username: form.username, password: form.password })
          });
          const d = await resp.json();
          if (resp.ok) setToast({ message: d.message, type: 'ok' });
          else setToast({ message: d.error, type: 'error' });
        } catch { setToast({ message: 'Failed to create user', type: 'error' }); }
        setCreatingUser(false);
      };

      const createHyperdrive = async () => {
        if (!form.hostname || !form.access_client_id || !form.access_client_secret) {
          return setToast({ message: 'Hostname, Access Client ID, and Secret are required', type: 'error' });
        }
        if (!form.username || !form.password) {
          return setToast({ message: 'Create the DB user first', type: 'error' });
        }
        try {
          const resp = await fetch('/api/hyperdrive', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              database: formDb,
              username: form.username,
              password: form.password,
              hostname: form.hostname,
              hyperdrive_name: form.hyperdrive_name || undefined,
              access_client_id: form.access_client_id,
              access_client_secret: form.access_client_secret
            })
          });
          const d = await resp.json();
          if (resp.ok) {
            setTaskViewer({ title: `Hyperdrive — ${formDb}`, statusUrl: '/api/hyperdrive/status' });
            setShowForm(false);
          } else {
            setToast({ message: d.error, type: 'error' });
          }
        } catch { setToast({ message: 'Failed to create Hyperdrive', type: 'error' }); }
      };

      const deleteConfig = async (key) => {
        setConfirmDelete(null);
        try {
          const resp = await fetch(`/api/hyperdrive/${encodeURIComponent(key)}`, { method: 'DELETE' });
          const d = await resp.json();
          setToast({ message: d.message || 'Deleted', type: 'ok' });
          fetchData();
        } catch { setToast({ message: 'Delete failed', type: 'error' }); }
      };

      const updateConfig = async (key) => {
        if (!updatePassword) return;
        try {
          const resp = await fetch(`/api/hyperdrive/${encodeURIComponent(key)}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: updatePassword })
          });
          const d = await resp.json();
          if (resp.ok) { setToast({ message: 'Password updated', type: 'ok' }); setUpdateKey(null); setUpdatePassword(''); }
          else setToast({ message: d.error, type: 'error' });
        } catch { setToast({ message: 'Update failed', type: 'error' }); }
      };

      const copyToClipboard = (text, id) => {
        navigator.clipboard.writeText(text).then(() => {
          setCopiedId(id);
          setTimeout(() => setCopiedId(null), 2000);
        });
      };

      const closeTasks = () => { setTaskViewer(null); fetchData(); };

      if (loading) return React.createElement('div', { className: 'panel' },
        React.createElement('div', { className: 'panel-header' }, React.createElement('span', null, 'Cloudflare Hyperdrive')),
        React.createElement('div', { className: 'panel-body', style: { color: 'var(--text-muted)' } }, 'Loading...')
      );

      const entries = data?.entries || [];
      const configured = entries.filter(e => e.configured);

      return (
        <div>
          <div className="panel">
            <div className="panel-header" style={{ cursor: 'pointer', userSelect: 'none' }} onClick={onToggle}>
              <span style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <span style={{ display: 'inline-block', transition: 'transform 0.2s', transform: collapsed ? 'rotate(0deg)' : 'rotate(90deg)', fontSize: 10 }}>&#9654;</span>
                Cloudflare Hyperdrive
              </span>
              <a href="https://github.com/iadityaharsh/postgresql-cluster/blob/main/docs/hyperdrive.md" target="_blank" rel="noopener noreferrer"
                 className="btn" style={{ padding: '3px 10px', fontSize: 11, textDecoration: 'none' }} onClick={e => e.stopPropagation()}>
                View Docs
              </a>
            </div>
            {!collapsed && <div className="panel-body">
              <div style={{ marginBottom: 14, fontSize: 12, color: 'var(--text-muted)', lineHeight: 1.6 }}>
                Connect Cloudflare Workers to your databases via Hyperdrive — edge connection pooling, query caching, and regional routing.
                {!data?.wrangler_installed && <span style={{ color: 'var(--warn)', display: 'block', marginTop: 4 }}>Wrangler CLI not detected. Install with: npm install -g wrangler</span>}
              </div>

              {/* Database table */}
              <table className="data-table" style={{ marginBottom: 16 }}>
                <thead>
                  <tr>
                    <th>Database</th>
                    <th>Domain</th>
                    <th>Hyperdrive</th>
                    <th>Status</th>
                    <th style={{ width: 80 }}></th>
                  </tr>
                </thead>
                <tbody>
                  {entries.map(entry => {
                    const cfg = entry.config;
                    const key = cfg ? `${cfg.database}-${cfg.username}` : null;
                    const isPostgres = entry.database === 'postgres';
                    const postgresDisabled = isPostgres && !data?.postgres_hyperdrive;
                    return (
                      <tr key={entry.database} style={postgresDisabled && !cfg ? { opacity: 0.5 } : undefined}>
                        <td style={{ fontWeight: 500 }}>{entry.database}{entry.missing && <span style={{ color: 'var(--warn)', fontSize: 10, marginLeft: 6 }}>dropped?</span>}</td>
                        <td style={{ fontSize: 12, color: cfg?.hostname ? 'var(--text)' : 'var(--text-dim)' }}>{cfg?.hostname || '\u2014'}</td>
                        <td style={{ fontFamily: 'monospace', fontSize: 11, color: cfg?.hyperdrive_id ? 'var(--text)' : 'var(--text-dim)' }}>
                          {cfg?.hyperdrive_id ? (
                            <span style={{ cursor: 'pointer' }} title="Click to copy" onClick={() => copyToClipboard(cfg.hyperdrive_id, cfg.hyperdrive_id)}>
                              {copiedId === cfg.hyperdrive_id ? 'Copied!' : cfg.hyperdrive_id.slice(0, 12) + '...'}
                            </span>
                          ) : '\u2014'}
                        </td>
                        <td>{cfg ? <Badge type="ok" text="Connected" /> : postgresDisabled ? <span style={{ color: 'var(--text-dim)', fontSize: 12 }}>Disabled</span> : <span style={{ color: 'var(--text-dim)', fontSize: 12 }}>Not configured</span>}</td>
                        <td>
                          {cfg ? (
                            <div style={{ display: 'flex', gap: 4 }}>
                              <button className="btn" style={{ padding: '2px 8px', fontSize: 11 }} onClick={() => setDetailKey(key)}>Details</button>
                              <button className="btn" style={{ padding: '2px 8px', fontSize: 11 }} onClick={() => { setUpdateKey(key); setUpdatePassword(''); }}>Edit</button>
                              <button className="btn" style={{ padding: '2px 8px', fontSize: 11, color: 'var(--err)' }} onClick={() => setConfirmDelete(key)}>Delete</button>
                            </div>
                          ) : postgresDisabled ? (
                            <span style={{ fontSize: 11, color: 'var(--text-dim)' }}>\u2014</span>
                          ) : (
                            <button className="btn primary" style={{ padding: '2px 10px', fontSize: 11 }} onClick={() => openSetup(entry.database)}>Setup</button>
                          )}
                        </td>
                      </tr>
                    );
                  })}
                  {entries.length === 0 && (
                    <tr><td colSpan="5" style={{ textAlign: 'center', color: 'var(--text-dim)', padding: 20 }}>No databases found</td></tr>
                  )}
                </tbody>
              </table>
              <div style={{ fontSize: 11, color: 'var(--text-dim)', lineHeight: 1.5 }}>
                The <strong>postgres</strong> database is disabled for Hyperdrive by default for security reasons. To enable it, add <code style={{ background: 'var(--bg-base)', padding: '1px 5px', borderRadius: 3, fontSize: 10 }}>POSTGRES_HYPERDRIVE="ON"</code> to <code style={{ background: 'var(--bg-base)', padding: '1px 5px', borderRadius: 3, fontSize: 10 }}>cluster.conf</code> on each node and restart the dashboard.
              </div>
            </div>}
          </div>

          {/* Connection Details modal */}
          {detailKey && (() => {
            const detailCfg = entries.find(e => e.config && `${e.config.database}-${e.config.username}` === detailKey)?.config;
            if (!detailCfg) return null;
            const snippet = `{\n  "hyperdrive": [\n    {\n      "binding": "HYPERDRIVE",\n      "id": "${detailCfg.hyperdrive_id || 'YOUR_HYPERDRIVE_ID'}"\n    }\n  ]\n}`;
            return (
              <div className="modal-overlay" onClick={() => setDetailKey(null)}>
                <div className="modal" onClick={e => e.stopPropagation()} style={{ maxWidth: 520 }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                    <h3 style={{ margin: 0 }}>Connection Details — {detailCfg.database}</h3>
                    <Badge type="ok" text="Connected" />
                  </div>
                  <table className="kv-table" style={{ marginTop: 14, marginBottom: 16 }}>
                    <tbody>
                      <tr><td>Hostname</td><td>{detailCfg.hostname}</td></tr>
                      <tr><td>Database</td><td>{detailCfg.database}</td></tr>
                      <tr><td>User</td><td>{detailCfg.username}</td></tr>
                      <tr><td>Hyperdrive Name</td><td>{detailCfg.hyperdrive_name || '\u2014'}</td></tr>
                      <tr>
                        <td>Hyperdrive ID</td>
                        <td style={{ fontFamily: 'monospace', fontSize: 11 }}>
                          {detailCfg.hyperdrive_id || 'N/A'}
                          {detailCfg.hyperdrive_id && (
                            <button className="btn" style={{ marginLeft: 8, padding: '1px 6px', fontSize: 10 }}
                              onClick={() => copyToClipboard(detailCfg.hyperdrive_id, detailKey + '-detail-id')}>
                              {copiedId === detailKey + '-detail-id' ? 'Copied!' : 'Copy'}
                            </button>
                          )}
                        </td>
                      </tr>
                      <tr><td>Created</td><td>{detailCfg.created ? new Date(detailCfg.created).toLocaleDateString() : 'N/A'}</td></tr>
                    </tbody>
                  </table>
                  <div style={{ position: 'relative' }}>
                    <div style={{ fontSize: 11, color: 'var(--text-dim)', marginBottom: 4 }}>wrangler.jsonc snippet:</div>
                    <pre style={{ background: 'var(--bg-base)', border: '1px solid var(--border-subtle)', borderRadius: 4, padding: '8px 10px', fontSize: 11, color: 'var(--text)', overflow: 'auto', maxHeight: 120, margin: 0 }}>{snippet}</pre>
                    <button className="btn" style={{ position: 'absolute', top: 0, right: 0, padding: '2px 8px', fontSize: 10 }}
                      onClick={() => copyToClipboard(snippet, detailKey + '-detail-snippet')}>
                      {copiedId === detailKey + '-detail-snippet' ? 'Copied!' : 'Copy'}
                    </button>
                  </div>
                  <div className="modal-actions" style={{ marginTop: 16 }}>
                    <button className="btn" onClick={() => setDetailKey(null)}>Close</button>
                  </div>
                </div>
              </div>
            );
          })()}

          {/* Setup form modal */}
          {showForm && (
            <div className="modal-overlay" onClick={() => setShowForm(false)}>
              <div className="modal" onClick={e => e.stopPropagation()} style={{ maxWidth: 520 }}>
                <h3>Setup Hyperdrive — {formDb}</h3>

                <div style={{ marginTop: 12 }}>
                  <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-bright)', marginBottom: 8 }}>1. Database User</div>
                  <div className="form-group" style={{ marginBottom: 6 }}>
                    <label>Username</label>
                    <input type="text" value={form.username} onChange={e => setForm(f => ({ ...f, username: e.target.value }))} placeholder="cf_mydb" />
                  </div>
                  <div className="form-group" style={{ marginBottom: 6 }}>
                    <label>Password</label>
                    <div style={{ display: 'flex', gap: 6 }}>
                      <input type="text" value={form.password} onChange={e => setForm(f => ({ ...f, password: e.target.value }))} style={{ flex: 1, fontFamily: 'monospace', fontSize: 11 }} />
                      <button className="btn" style={{ padding: '4px 10px', fontSize: 11 }} onClick={generatePassword}>Generate</button>
                    </div>
                  </div>
                  <button className="btn primary" style={{ fontSize: 12, marginBottom: 16 }} onClick={createUser} disabled={creatingUser}>
                    {creatingUser ? 'Creating...' : 'Create DB User'}
                  </button>
                </div>

                <div>
                  <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-bright)', marginBottom: 8 }}>2. Hyperdrive Config</div>
                  <div className="form-group" style={{ marginBottom: 6 }}>
                    <label>Tunnel Hostname</label>
                    <input type="text" value={form.hostname} onChange={e => setForm(f => ({ ...f, hostname: e.target.value }))} placeholder="db-cluster.example.com" />
                  </div>
                  <div className="form-group" style={{ marginBottom: 6 }}>
                    <label>Hyperdrive Name (optional)</label>
                    <input type="text" value={form.hyperdrive_name} onChange={e => setForm(f => ({ ...f, hyperdrive_name: e.target.value }))} placeholder={`${formDb}-hyperdrive`} />
                  </div>
                  <div className="form-group" style={{ marginBottom: 6 }}>
                    <label>Access Client ID</label>
                    <input type="text" value={form.access_client_id} onChange={e => setForm(f => ({ ...f, access_client_id: e.target.value }))} placeholder="xxxxxxxx.access" />
                  </div>
                  <div className="form-group" style={{ marginBottom: 6 }}>
                    <label>Access Client Secret</label>
                    <input type="password" value={form.access_client_secret} onChange={e => setForm(f => ({ ...f, access_client_secret: e.target.value }))} />
                  </div>
                  <p style={{ fontSize: 11, color: 'var(--text-dim)', marginBottom: 10, lineHeight: 1.5 }}>
                    Create a Service Token at <strong>Zero Trust &gt; Access &gt; Service Auth</strong>. The tunnel hostname must point to <strong>tcp://VIP:5432</strong>.
                  </p>
                </div>

                <div className="modal-actions">
                  <button className="btn" onClick={() => setShowForm(false)}>Cancel</button>
                  <button className="btn primary" onClick={createHyperdrive}>Create Hyperdrive</button>
                </div>
              </div>
            </div>
          )}

          {/* Edit config modal */}
          {updateKey && (() => {
            const editCfg = entries.find(e => e.config && `${e.config.database}-${e.config.username}` === updateKey)?.config;
            if (!editCfg) return null;
            const snippet = `{\n  "hyperdrive": [\n    {\n      "binding": "HYPERDRIVE",\n      "id": "${editCfg.hyperdrive_id || 'YOUR_HYPERDRIVE_ID'}"\n    }\n  ]\n}`;
            return (
              <div className="modal-overlay" onClick={() => setUpdateKey(null)}>
                <div className="modal" onClick={e => e.stopPropagation()} style={{ maxWidth: 520 }}>
                  <h3>Edit — {editCfg.database}</h3>

                  <table className="kv-table" style={{ marginTop: 12, marginBottom: 16 }}>
                    <tbody>
                      <tr><td>Database</td><td>{editCfg.database}</td></tr>
                      <tr><td>Hostname</td><td>{editCfg.hostname}</td></tr>
                      <tr><td>User</td><td>{editCfg.username}</td></tr>
                      <tr><td>Hyperdrive Name</td><td>{editCfg.hyperdrive_name || '\u2014'}</td></tr>
                      <tr>
                        <td>Hyperdrive ID</td>
                        <td style={{ fontFamily: 'monospace', fontSize: 11 }}>
                          {editCfg.hyperdrive_id || 'N/A'}
                          {editCfg.hyperdrive_id && (
                            <button className="btn" style={{ marginLeft: 8, padding: '1px 6px', fontSize: 10 }}
                              onClick={() => copyToClipboard(editCfg.hyperdrive_id, updateKey + '-edit-id')}>
                              {copiedId === updateKey + '-edit-id' ? 'Copied!' : 'Copy'}
                            </button>
                          )}
                        </td>
                      </tr>
                      <tr><td>Created</td><td>{editCfg.created ? new Date(editCfg.created).toLocaleDateString() : 'N/A'}</td></tr>
                    </tbody>
                  </table>

                  <div style={{ position: 'relative', marginBottom: 16 }}>
                    <div style={{ fontSize: 11, color: 'var(--text-dim)', marginBottom: 4 }}>wrangler.jsonc snippet:</div>
                    <pre style={{ background: 'var(--bg-base)', border: '1px solid var(--border-subtle)', borderRadius: 4, padding: '8px 10px', fontSize: 11, color: 'var(--text)', overflow: 'auto', maxHeight: 120, margin: 0 }}>{snippet}</pre>
                    <button className="btn" style={{ position: 'absolute', top: 0, right: 0, padding: '2px 8px', fontSize: 10 }}
                      onClick={() => copyToClipboard(snippet, updateKey + '-edit-snippet')}>
                      {copiedId === updateKey + '-edit-snippet' ? 'Copied!' : 'Copy'}
                    </button>
                  </div>

                  <div style={{ borderTop: '1px solid var(--border-subtle)', paddingTop: 14 }}>
                    <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-bright)', marginBottom: 8 }}>Update Origin Password</div>
                    <p style={{ margin: '0 0 8px', fontSize: 11, color: 'var(--text-dim)', lineHeight: 1.5 }}>
                      Change the origin password on Cloudflare's side. This does not update the database user password.
                    </p>
                    <div className="form-group" style={{ marginBottom: 12 }}>
                      <label>New Password</label>
                      <input type="text" value={updatePassword} onChange={e => setUpdatePassword(e.target.value)} style={{ fontFamily: 'monospace', fontSize: 11 }} placeholder="Leave empty to keep current" />
                    </div>
                  </div>

                  <div className="modal-actions">
                    <button className="btn" onClick={() => setUpdateKey(null)}>Close</button>
                    <button className="btn primary" onClick={() => updateConfig(updateKey)} disabled={!updatePassword}>Update Password</button>
                  </div>
                </div>
              </div>
            );
          })()}

          {confirmDelete && (
            <ConfirmModal
              title="Delete Hyperdrive Config"
              message="This will delete the Hyperdrive config from Cloudflare and remove the local configuration. This cannot be undone."
              confirmText="Delete"
              confirmClass="danger"
              onConfirm={() => deleteConfig(confirmDelete)}
              onCancel={() => setConfirmDelete(null)}
            />
          )}

          {taskViewer && <TaskViewer title={taskViewer.title} statusUrl={taskViewer.statusUrl} onClose={closeTasks} />}
          {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
        </div>
      );
    }

    // ========== Settings Tab ==========
    const THEMES = [
      { id: 'dark', name: 'Dark', colors: ['#1a1a2e', '#1e1e32', '#2d2d44', '#f97316'] },
      { id: 'light', name: 'Light', colors: ['#f0f0f5', '#ffffff', '#e8e8f0', '#ea580c'] },
      { id: 'nord-dark', name: 'Nord Dark', colors: ['#2e3440', '#3b4252', '#434c5e', '#d08770'] },
      { id: 'nord-light', name: 'Nord Light', colors: ['#eceff4', '#ffffff', '#e5e9f0', '#c06840'] },
    ];

    function SettingsTab() {
      const [theme, setTheme] = useState(() => localStorage.getItem('theme') || 'dark');
      const [toast, setToast] = useState(null);
      const [tunnel, setTunnel] = useState(null);
      const [tunnelName, setTunnelName] = useState('');
      const [taskViewer, setTaskViewer] = useState(null);
      const [cfAuth, setCfAuth] = useState({ account_id: '', api_token: '' });
      const [cfStatus, setCfStatus] = useState(null);
      const [savingAuth, setSavingAuth] = useState(false);
      const [tunnelOpen, setTunnelOpen] = useState(() => localStorage.getItem('panel_tunnel') === 'open');
      const [hyperdriveOpen, setHyperdriveOpen] = useState(() => localStorage.getItem('panel_hyperdrive') === 'open');
      const [confirmRestart, setConfirmRestart] = useState(false);
      const [restarting, setRestarting] = useState(false);

      const togglePanel = (panel, open, setter) => {
        const next = !open;
        setter(next);
        localStorage.setItem(`panel_${panel}`, next ? 'open' : 'closed');
      };

      const fetchCfStatus = useCallback(async () => {
        try {
          const d = await fetch('/api/cloudflare-auth').then(r => r.json());
          setCfStatus(d);
        } catch {}
      }, []);

      const saveCfAuth = async () => {
        if (!cfAuth.api_token || !cfAuth.account_id) return setToast({ message: 'Both Account ID and API Token are required', type: 'error' });
        setSavingAuth(true);
        try {
          const resp = await fetch('/api/cloudflare-auth', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(cfAuth)
          });
          const d = await resp.json();
          if (resp.ok) { setToast({ message: 'Credentials saved', type: 'ok' }); setTimeout(fetchCfStatus, 500); }
          else setToast({ message: d.error, type: 'error' });
        } catch { setToast({ message: 'Failed to save credentials', type: 'error' }); }
        setSavingAuth(false);
      };

      const resetCfAuth = async () => {
        try {
          const resp = await fetch('/api/cloudflare-auth', { method: 'DELETE' });
          const d = await resp.json();
          if (resp.ok) { setToast({ message: 'Credentials cleared', type: 'ok' }); setCfAuth({ account_id: '', api_token: '' }); setCfStatus({ available: false }); }
          else setToast({ message: d.error, type: 'error' });
        } catch { setToast({ message: 'Failed to reset credentials', type: 'error' }); }
      };

      const applyTheme = (id) => {
        document.documentElement.setAttribute('data-theme', id);
        localStorage.setItem('theme', id);
        setTheme(id);
      };

      const exportConfig = () => {
        window.open('/api/config/export', '_blank');
      };

      const exportPatroniConfig = async () => {
        try {
          const data = await fetch('/api/config/patroni').then(r => r.json());
          const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `patroni-config-${new Date().toISOString().slice(0,10)}.json`;
          a.click();
          URL.revokeObjectURL(url);
        } catch { setToast({ message: 'Failed to export Patroni config', type: 'error' }); }
      };

      const fetchTunnel = useCallback(async () => {
        try {
          const data = await fetch('/api/tunnel').then(r => r.json());
          setTunnel(data);
        } catch {}
      }, []);

      useEffect(() => { fetchCfStatus(); fetchTunnel(); }, [fetchCfStatus, fetchTunnel]);

      const createTunnel = async () => {
        if (!tunnelName.trim()) return setToast({ message: 'Enter a tunnel name', type: 'error' });
        try {
          const resp = await fetch('/api/tunnel/create', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: tunnelName.trim() })
          });
          const data = await resp.json();
          if (resp.ok) {
            setTaskViewer({ title: 'Creating Tunnel — All Nodes', statusUrl: '/api/tunnel/status' });
          } else {
            setToast({ message: data.error, type: 'error' });
          }
        } catch { setToast({ message: 'Failed to create tunnel', type: 'error' }); }
      };

      const closeTasks = () => { setTaskViewer(null); fetchTunnel(); };

      const restartCluster = async () => {
        setConfirmRestart(false);
        setRestarting(true);
        setTaskViewer({ title: 'Restarting All Nodes', statusUrl: '/api/restart/status' });
        try {
